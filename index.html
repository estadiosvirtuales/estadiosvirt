<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estadios Virtuales | El Mundo Desde el Aire</title>
    <style>
        /* Variables de colores (Estilo Modo Oscuro Premium) */
        :root {
            --bg-color: #0c0c0c;
            --card-bg: #161616;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --accent-color: #1db954; /* Verde estilo Spotify */
            --accent-hover: #1ed760;
            --danger-color: #e50914; /* Rojo estilo Netflix */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-bottom: 50px;
        }

        /* PORTADA CINEMÁTICA CON IDENTIDAD OPTIMIZADA */
        .hero-section {
            position: relative;
            padding: 60px 20px 40px 20px;
            text-align: center;
            background: linear-gradient(180deg, rgba(29, 185, 84, 0.12) 0%, rgba(20, 20, 20, 0.6) 50%, var(--bg-color) 100%), 
                        radial-gradient(circle at top, #1a3a21 0%, #0c0c0c 70%);
            border-bottom: 1px solid #1a1a1a;
        }

        .hero-content {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Logo optimizado */
        .brand-logo {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid var(--accent-color);
            box-shadow: 0 4px 20px rgba(29, 185, 84, 0.3), inset 0 0 15px rgba(0,0,0,0.5);
            margin-bottom: 18px;
            transition: transform 0.3s ease;
        }

        .brand-logo:hover {
            transform: scale(1.04) rotate(2deg);
        }

        .hero-section h1 {
            font-size: 2.3rem;
            font-weight: 900;
            margin-bottom: 15px;
            letter-spacing: -0.5px;
            background: linear-gradient(180deg, #ffffff 0%, #e0e0e0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-subtitle {
            font-size: 1.15rem;
            color: var(--text-muted);
            margin-bottom: 30px;
            font-weight: 400;
            max-width: 600px;
            line-height: 1.6;
        }

        /* Buscador */
        .search-container {
            width: 100%;
            max-width: 550px;
            margin: 0 auto 25px auto;
            position: relative;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            border-radius: 30px;
        }

        .search-bar {
            width: 100%;
            padding: 16px 25px;
            border-radius: 30px;
            border: 1px solid #2a2a2a;
            background-color: rgba(30, 30, 30, 0.85);
            color: white;
            font-size: 1.05rem;
            outline: none;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .search-bar:focus {
            background-color: #222222;
            border-color: var(--accent-color);
            box-shadow: 0 0 15px rgba(29, 185, 84, 0.3);
        }

        .hero-stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .stat-item {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .stat-item strong {
            color: var(--text-main);
            font-size: 1.05rem;
        }

        /* SECCIÓN DE FILTROS */
        .section-ligas {
            max-width: 1200px;
            margin: 35px auto 20px auto;
            padding: 0 20px;
        }

        .section-title {
            font-size: 1.3rem;
            font-weight: 800;
            margin-bottom: 15px;
            letter-spacing: -0.5px;
            text-transform: uppercase;
            color: #f5f5f5;
            border-left: 4px solid var(--accent-color);
            padding-left: 12px;
        }

        .tabs-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 5px 0 15px 0;
            justify-content: center;
        }

        .tab {
            background-color: #1c1c1c;
            color: var(--text-main);
            border: 1px solid #252525;
            padding: 10px 22px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 700;
            white-space: nowrap;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .tab.active, .tab:hover {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
            color: #000;
            box-shadow: 0 4px 12px rgba(29, 185, 84, 0.2);
        }

        /* Grilla de Estadios */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            padding: 0 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s, background-color 0.3s;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            border: 1px solid #1f1f1f;
        }

        .card:hover {
            background-color: #1f1f1f;
            transform: translateY(-5px);
            border-color: #2d2d2d;
        }

        .estadio-foto-container {
            width: 100%;
            height: 180px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 25px;
            transition: filter 0.3s;
        }

        .card:hover .estadio-foto-container {
            filter: brightness(1.15);
        }

        .card-img-logo {
            max-height: 85%;
            max-width: 85%;
            object-fit: contain;
            filter: drop-shadow(0px 8px 12px rgba(0,0,0,0.8));
            transition: transform 0.3s ease-out;
            z-index: 2;
        }

        .card:hover .card-img-logo {
            transform: scale(1.08) rotate(2deg);
        }

        .estadio-foto-container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(0deg, rgba(22,22,22,0.9) 0%, rgba(0,0,0,0.2) 100%);
            z-index: 1;
        }

        .placeholder-text {
            color: rgba(255,255,255,0.15);
            font-weight: 900;
            font-size: 1.3rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-align: center;
            padding: 0 10px;
            z-index: 2;
        }

        .trivia-hint {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.6);
            color: var(--accent-color);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            z-index: 4;
            border: 1px solid rgba(29, 185, 84, 0.2);
            backdrop-filter: blur(4px);
            transition: all 0.3s;
        }

        .card:hover .trivia-hint {
            background: var(--accent-color);
            color: #000;
            box-shadow: 0 0 10px var(--accent-color);
        }

        /* GLOBO EMERGENTE CON PESTAÑAS (TRIVIA / MAPA) */
        .trivia-balloon {
            position: absolute;
            top: 8px;
            left: 8px;
            right: 8px;
            bottom: 8px;
            background: rgba(16, 16, 16, 0.98);
            border: 1px solid var(--accent-color);
            border-radius: 8px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transform: scale(0.92);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
        }

        .trivia-balloon.active {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1);
            box-shadow: 0 8px 24px rgba(0,0,0,0.8);
        }

        .balloon-tabs {
            display: flex;
            width: 100%;
            border-bottom: 1px solid #333;
            margin-bottom: 8px;
            flex-shrink: 0;
        }

        .b-tab {
            flex: 1;
            background: transparent;
            color: var(--text-muted);
            border: none;
            padding: 6px 0;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .b-tab.active {
            color: var(--accent-color);
            border-bottom: 2px solid var(--accent-color);
        }

        .b-content {
            display: none;
            width: 100%;
            height: 100%;
            overflow-y: auto;
            color: var(--text-main);
            font-size: 0.85rem;
            line-height: 1.4;
            text-align: center;
            align-items: center;
            justify-content: center;
        }

        .b-content.active {
            display: flex;
        }

        .b-mapa iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 4px;
            filter: invert(100%) hue-rotate(180deg) contrast(90%) sepia(20%);
        }

        .card-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            z-index: 2;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 5px;
            letter-spacing: -0.3px;
        }

        .card-subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 15px;
        }

        /* Transformamos la etiqueta <a> en un <button> nativo */
        .btn-view {
            display: inline-block;
            width: 100%;
            padding: 12px;
            background-color: var(--accent-color);
            color: #000;
            text-align: center;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: auto;
        }

        .btn-view:hover {
            background-color: var(--accent-hover);
        }

        /* Botón Ruleta */
        .btn-random {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: var(--danger-color);
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(229, 9, 20, 0.4);
            transition: transform 0.2s;
            z-index: 1000;
        }

        .btn-random:hover {
            transform: scale(1.05);
        }

        /* Botón Flotante de Trivia */
        .btn-game {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background-color: var(--accent-color);
            color: black;
            border: none;
            padding: 15px 25px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(29, 185, 84, 0.4);
            transition: transform 0.2s;
            z-index: 1000;
        }
        .btn-game:hover {
            transform: scale(1.05);
            background-color: var(--accent-hover);
        }

        /* Estilos del contenedor del minijuego */
        #game-ui {
            display: none;
            width: 100%;
            background: rgba(16, 16, 16, 0.98);
            padding: 15px;
            border-top: 2px solid var(--accent-color);
            text-align: center;
            z-index: 2010;
        }
        #game-title {
            font-size: 1.05rem;
            color: #ffffff;
            margin-bottom: 12px;
            font-weight: bold;
        }
        .game-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
        }
        .game-btn {
            background-color: #222;
            border: 1px solid #333;
            color: white;
            padding: 10px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .game-btn:hover {
            background-color: #2b2b2b;
            border-color: var(--accent-color);
        }
        .game-btn.correct {
            background-color: var(--accent-color);
            color: #000;
            border-color: var(--accent-color);
        }
        .game-btn.wrong {
            background-color: var(--danger-color);
            color: #fff;
            border-color: var(--danger-color);
        }

        /* =========================================
           DISEÑO RESPONSIVE (MÓVILES Y TABLETS)
           ========================================= */
        @media (max-width: 768px) {
            .hero-section { padding: 40px 15px 25px 15px; }
            .brand-logo { width: 90px; height: 90px; margin-bottom: 12px; }
            .hero-section h1 { font-size: 1.8rem; }
            .hero-subtitle { font-size: 1rem; margin-bottom: 20px; }
            .search-bar { padding: 14px 20px; font-size: 1rem; }
            .hero-stats { gap: 15px; flex-direction: column; align-items: center; }
            .tab { padding: 8px 14px; font-size: 0.8rem; flex-grow: 1; text-align: center; }
            .grid { grid-template-columns: 1fr; gap: 20px; padding: 0 15px; }
            .estadio-foto-container { height: 200px; }
            .trivia-balloon { padding: 8px; }
            .b-tab { font-size: 0.75rem; padding: 4px 0; }
            .b-content { font-size: 0.8rem; }
            .btn-random {
                bottom: 20px;
                right: 50%;
                transform: translateX(50%);
                padding: 12px 25px;
                font-size: 0.95rem;
                width: max-content;
                box-shadow: 0 4px 15px rgba(229, 9, 20, 0.5);
            }
            .btn-random:hover { transform: translateX(50%) scale(1.05); }
            
            .btn-game {
                bottom: 75px;
                right: 50%;
                left: auto;
                transform: translateX(50%);
                padding: 12px 25px;
                font-size: 0.95rem;
                width: max-content;
            }
            .game-options {
                grid-template-columns: 1fr;
                gap: 8px;
            }
        }

        /* =========================================
           ESTILOS DEL REPRODUCTOR INTELIGENTE (MODAL)
           ========================================= */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            position: relative;
            width: 90%;
            max-width: 400px; /* Tamaño ideal para videos verticales */
            height: 80vh;
            background: #000;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(29, 185, 84, 0.4);
            border: 1px solid var(--accent-color);
            display: flex;
            flex-direction: column;
        }

        .close-btn {
            position: absolute;
            top: -15px;
            right: -15px;
            width: 35px;
            height: 35px;
            background: var(--danger-color);
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            z-index: 2010;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .close-btn:hover {
            transform: scale(1.1);
            background: #ff0f1f;
        }

        .video-container {
            width: 100%;
            height: 100%;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>

            if (coloresClubes[nombreClub]) return coloresClubes[nombreClub];
            return "linear-gradient(135deg, #1f1f1f, #333333)";
        }

        // LÓGICA DEL REPRODUCTOR INTELIGENTE ACTUALIZADA (YouTube + mp4 + TikTok)
        function abrirModalVideo(event, link, esJuego = false) {
            if (event) event.preventDefault(); // Evita que recargue la página o salte arriba
            
            if (!link || link === '#' || link.includes('[Pegá tu link')) {
                alert("El video de este estadio todavía no está disponible.");
                return;
            }

            const modal = document.getElementById('video-modal');
            const container = document.getElementById('modal-video-container');
            container.innerHTML = ''; // Limpiamos el contenedor por si había otro video cargado

            // Control visual del espacio de la Trivia
            const gameUi = document.getElementById('game-ui');
            if (esJuego) {
                gameUi.style.display = 'block';
                container.style.height = 'calc(100% - 170px)';
            } else {
                gameUi.style.display = 'none';
                container.style.height = '100%';
            }

            let urlIncrustar = link;

            // 1. Detectar si es un video de YouTube
            if (link.includes('youtube.com') || link.includes('youtu.be')) {
                let videoId = '';
                
                if (link.includes('youtu.be/')) {
                    videoId = link.split('youtu.be/')[1].split('?')[0];
                } else if (link.includes('youtube.com/watch')) {
                    const urlParams = new URLSearchParams(new URL(link).search);
                    videoId = urlParams.get('v');
                } else if (link.includes('youtube.com/shorts/')) {
                     videoId = link.split('youtube.com/shorts/')[1].split('?')[0];
                }

                if (videoId) {
                    urlIncrustar = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0&modestbranding=1`;
                }
                
                container.innerHTML = `
                    <iframe src="${urlIncrustar}" style="width: 100%; height: 100%; border: none;" allow="autoplay; fullscreen; encrypted-media" allowfullscreen></iframe>
                `;
            } 
            // 2. Si es un archivo nativo .mp4
            else if (link.toLowerCase().endsWith('.mp4') || link.includes('.mp4?')) {
                container.innerHTML = `
                    <video controls autoplay style="width: 100%; height: 100%; object-fit: cover;">
                        <source src="${link}" type="video/mp4">
                        Tu navegador no soporta videos HTML5.
                    </video>
                `;
            } 
            // 3. Fallback genérico para otros links (como TikTok)
            else {
                if (link.includes('tiktok.com') && !link.includes('/embed/')) {
                    const matchId = link.match(/video\/(\d+)/);
                    if (matchId && matchId[1]) {
                        urlIncrustar = `https://www.tiktok.com/embed/v2/${matchId[1]}`;
                    }
                }

                container.innerHTML = `
                    <iframe src="${urlIncrustar}" style="width: 100%; height: 100%; border: none;" allow="autoplay; fullscreen; encrypted-media"></iframe>
                `;
            }

            modal.style.display = 'flex';
        }

        function cerrarModalVideo() {
            const modal = document.getElementById('video-modal');
            const container = document.getElementById('modal-video-container');
            modal.style.display = 'none';
            container.innerHTML = ''; // Vacía el contenido para cortar el audio al instante
            document.getElementById('game-ui').style.display = 'none'; // Asegura ocultar el juego al cerrar
        }

        function switchTab(event, btn, type, estadio = '', pais = '') {
            event.stopPropagation();
            const balloon = btn.closest('.trivia-balloon');
            
            balloon.querySelectorAll('.b-tab').forEach(t => t.classList.remove('active'));
            balloon.querySelectorAll('.b-content').forEach(c => c.classList.remove('active'));
            
            btn.classList.add('active');
            const content = balloon.querySelector('.b-' + type);
            content.classList.add('active');

            if (type === 'mapa' && !content.innerHTML.trim()) {
                content.innerHTML = '<span style="color:var(--text-muted); font-size: 0.8rem;">Cargando mapa en modo oscuro...</span>';
                const query = encodeURIComponent(estadio + ' stadium ' + pais);
                setTimeout(() => {
                    content.innerHTML = `<iframe src="https://maps.google.com/maps?q=${query}&t=m&z=16&ie=UTF8&iwloc=&output=embed" loading="lazy"></iframe>`;
                }, 100);
            }
        }

        function renderizarTarjetas(listaEstadios) {
            const grilla = document.querySelector('.grid');
            grilla.innerHTML = ''; 

            if (listaEstadios.length === 0) {
                grilla.innerHTML = '<h3 style="color:var(--text-muted); text-align:center; width:100%; padding:40px;">No se encontraron estadios que coincidan con la búsqueda.</h3>';
                return;
            }
            
            listaEstadios.forEach(fila => {
                const urlFoto = fila.Foto ? fila.Foto.trim() : '';
                const clubNombre = fila.Club.trim();
                const fondoGradiente = obtenerFondoClub(clubNombre);
                const pais = fila.País || 'Argentina';
                const estadio = fila.Estadio || 'Estadio';
                const linkVideo = fila['Link del Video'] ? fila['Link del Video'].trim() : '#';
                
                // REPARADO CON ENTIDADES HTML PARA QUE NUNCA SE ROMPA EL SCRIPT
                const datoLimpio = (fila['Dato Curioso'] || '¡Este club esconde grandes historias en su estadio!').replace(/'/g, "&#39;").replace(/"/g, "&quot;");

                const tarjeta = `
                <article class="card">
                    <div class="estadio-foto-container" style="background: ${fondoGradiente};" onclick="toggleTriviaPopup(event, this)">
                        <div class="trivia-hint">💡</div>
                        
                        ${urlFoto ? 
                            `<img class="card-img-logo" src="${urlFoto}" alt="Escudo de ${clubNombre}" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">` : 
                            ''
                        }
                        <div class="placeholder-text" style="${urlFoto ? 'display: none;' : 'display: block;'}">
                            ${clubNombre}
                        </div>

                        <div class="trivia-balloon" onclick="event.stopPropagation()">
                            <div class="balloon-tabs">
                                <button class="b-tab active" onclick="switchTab(event, this, 'trivia')">Trivia</button>
                                <button class="b-tab" onclick="switchTab(event, this, 'mapa', '${estadio}', '${pais}')">Mapa</button>
                            </div>
                            <div class="b-content b-trivia active">
                                <p>${datoLimpio}</p>
                            </div>
                            <div class="b-content b-mapa">
                                </div>
                        </div>
                    </div>
                    <div class="card-content">
                        <h2 class="card-title">${estadio}</h2>
                        <p class="card-subtitle">${clubNombre} • ${pais}</p>
                        <button onclick="abrirModalVideo(event, '${linkVideo}')" class="btn-view">Ver Vuelo 3D</button>
                    </div>
                </article>`;
                grilla.innerHTML += tarjeta;
            });
        }

        function cargarLiga(gid) {
            const grilla = document.querySelector('.grid');
            grilla.innerHTML = '<h3 style="color:var(--text-muted); text-align:center; width:100%; padding:40px;">Cargando estadios...</h3>';
            document.getElementById('global-search').value = '';

            const urlCompleta = `${baseSpreadsheetUrl}&gid=${gid}`;

            Papa.parse(urlCompleta, {
                download: true,
                header: true, 
                complete: function(results) {
                    estadiosCargados = results.data.filter(fila => fila.Estadio && fila.Club);
                    renderizarTarjetas(estadiosCargados);
                },
                error: function(err) {
                    grilla.innerHTML = '<h2 style="color:white; text-align:center; padding: 40px;">Error al conectar con esta liga. Verificá el GID de la pestaña.</h2>';
                }
            });
        }

        function indexarCatalogoMasivo() {
            todosLosGids.forEach(gid => {
                const urlCompleta = `${baseSpreadsheetUrl}&gid=${gid}`;
                Papa.parse(urlCompleta, {
                    download: true,
                    header: true,
                    complete: function(results) {
                        const datosValidos = results.data.filter(fila => fila.Estadio && fila.Club);
                        datosValidos.forEach(estadio => {
                            const yaExiste = catalogoGlobal.some(e => e.Estadio === estadio.Estadio && e.Club === estadio.Club);
                            if (!yaExiste) catalogoGlobal.push(estadio);
                        });
                    }
                });
            });
        }

        document.getElementById('global-search').addEventListener('input', function(e) {
            const terminoBusqueda = e.target.value.toLowerCase().trim();
            
            if (terminoBusqueda === '') {
                document.getElementById('titulo-grilla').innerText = "Seleccioná una Categoría";
                renderizarTarjetas(estadiosCargados);
            } else {
                document.getElementById('titulo-grilla').innerText = "Resultados del Catálogo Masivo";
                const estadiosFiltrados = catalogoGlobal.filter(fila => {
                    const estadio = (fila.Estadio || '').toLowerCase();
                    const club = (fila.Club || '').toLowerCase();
                    const pais = (fila.País || '').toLowerCase();
                    return estadio.includes(terminoBusqueda) || club.includes(terminoBusqueda) || pais.includes(terminoBusqueda);
                });
                renderizarTarjetas(estadiosFiltrados);
            }
        });

        function toggleTriviaPopup(event, elementoContainer) {
            event.stopPropagation();

            const globoActual = elementoContainer.querySelector('.trivia-balloon');
            const yaEstaAbierto = globoActual.classList.contains('active');

            document.querySelectorAll('.trivia-balloon').forEach(g => {
                g.classList.remove('active');
                const tabTrivia = g.querySelector('.b-tab:first-child');
                if (tabTrivia) {
                    g.querySelectorAll('.b-tab').forEach(t => t.classList.remove('active'));
                    g.querySelectorAll('.b-content').forEach(c => c.classList.remove('active'));
                    tabTrivia.classList.add('active');
                    g.querySelector('.b-trivia').classList.add('active');
                }
            });

            if (!yaEstaAbierto) {
                globoActual.classList.add('active');
            }
        }

        document.addEventListener('click', function() {
            document.querySelectorAll('.trivia-balloon').forEach(g => {
                g.classList.remove('active');
            });
        });

        document.querySelector('.btn-random').addEventListener('click', function(e) {
            if (estadiosCargados.length === 0) return;

            const estadiosConVideo = estadiosCargados.filter(fila => {
                const link = fila['Link del Video'];
                return link && link.trim() !== '' && !link.includes('[Pegá tu link');
            });

            if (estadiosConVideo.length === 0) {
                alert('Aún no hay links de videos disponibles en esta liga para simular el vuelo aleatorio.');
                return;
            }

            const indiceAzar = Math.floor(Math.random() * estadiosConVideo.length);
            const estadioElegido = estadiosConVideo[indiceAzar];

            abrirModalVideo(e, estadioElegido['Link del Video'].trim());
        });

        document.querySelectorAll('.tab').forEach(boton => {
            boton.addEventListener('click', function() {
                document.getElementById('global-search').value = '';
                document.getElementById('titulo-grilla').innerText = "Seleccioná una Categoría";

                document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                
                const gidId = this.getAttribute('data-gid');
                cargarLiga(gidId);
            });
        });

        // --- SISTEMA DEL MINIJUEGO INTERACTIVO (TRIVIA) ---
        function iniciarTrivia() {
            if (catalogoGlobal.length < 4) {
                alert('Esperá un segundo a que se cargue por completo el catálogo masivo...');
                return;
            }

            // Filtramos únicamente estadios que contengan videos válidos para adivinar
            const estadiosConVideo = catalogoGlobal.filter(fila => {
                const link = fila['Link del Video'];
                return link && link.trim() !== '' && link.trim() !== '#' && !link.includes('[Pegá tu link');
            });

            if (estadiosConVideo.length === 0) {
                alert('No se encontraron suficientes videos en el catálogo para iniciar el juego.');
                return;
            }

            // Seleccionamos la respuesta correcta al azar
            const estadioCorrecto = estadiosConVideo[Math.floor(Math.random() * estadiosConVideo.length)];
            
            // Generamos las otras 3 respuestas incorrectas sin duplicar clubes
            let opciones = [estadioCorrecto];
            while (opciones.length < 4) {
                const opcionAleatoria = catalogoGlobal[Math.floor(Math.random() * catalogoGlobal.length)];
                if (!opciones.some(o => o.Club === opcionAleatoria.Club)) {
                    opciones.push(opcionAleatoria);
                }
            }

            // Mezclamos el array para que la opción correcta no quede siempre primera
            opciones.sort(() => Math.random() - 0.5);

            // Configuramos los textos del panel de la trivia
            document.getElementById('game-title').innerText = '¿De qué club es este estadio?';
            const contenedorOpciones = document.getElementById('game-options');
            contenedorOpciones.innerHTML = '';

            // Renderizamos los botones interactivos
            opciones.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'game-btn';
                btn.innerText = opt.Club;
                
                btn.onclick = function() {
                    // Desactivamos todas las opciones para que no sigan clickeando
                    document.querySelectorAll('.game-btn').forEach(b => b.disabled = true);
                    
                    if (opt.Club === estadioCorrecto.Club) {
                        btn.classList.add('correct');
                        document.getElementById('game-title').innerHTML = `¡CORRECTO! 🎉 Es de <strong>${estadioCorrecto.Club}</strong> (${estadioCorrecto.Estadio})`;
                    } else {
                        btn.classList.add('wrong');
                        document.getElementById('game-title').innerHTML = `¡INCORRECTO! ❌ Era el de <strong>${estadioCorrecto.Club}</strong> (${estadioCorrecto.Estadio})`;
                        
                        // Iluminamos la correcta en verde para guiar al usuario
                        document.querySelectorAll('.game-btn').forEach(b => {
                            if (b.innerText === estadioCorrecto.Club) b.classList.add('correct');
                        });
                    }
                };
                contenedorOpciones.appendChild(btn);
            });

            // Abrimos el modal forzando el modo minijuego (parámetro true)
            abrirModalVideo(null, estadioCorrecto['Link del Video'].trim(), true);
        }

        indexarCatalogoMasivo();
        const primerGid = document.querySelector('.tab.active').getAttribute('data-gid');
        cargarLiga(primerGid);
    </script>
</body>
</html>
