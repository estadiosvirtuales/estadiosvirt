<head>

    <title>Estadios Virtuales | El Mundo Desde el Aire</title>
    <style>
        /* Variables de colores (Estilo Modo Oscuro Premium) */
        :root {
            --bg-color: #0c0c0c;
            --card-bg: #161616;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --accent-color: #1db954; /* Verde estilo Spotify */
            --accent-hover: #1ed760;
            --danger-color: #e50914; /* Rojo estilo Netflix */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-bottom: 50px;
        }

        /* PORTADA CINEMÁTICA (Estilo Banner Netflix/Gaming) */
        .hero-section {
            position: relative;
            padding: 80px 20px 60px 20px;
            text-align: center;
            /* Degradado premium simulando iluminación de estadio de noche */
            background: linear-gradient(180deg, rgba(29, 185, 84, 0.15) 0%, rgba(20, 20, 20, 0.6) 50%, var(--bg-color) 100%), 
                        radial-gradient(circle at top, #1a3a21 0%, #0c0c0c 70%);
            border-bottom: 1px solid #1a1a1a;
        }

        .hero-content {
            max-width: 800px;
            margin: 0 auto;
        }

        .hero-badge {
            display: inline-block;
            background-color: rgba(29, 185, 84, 0.1);
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 20px;
        }

        .hero-section h1 {
            font-size: 3.2rem;
            font-weight: 900;
            margin-bottom: 15px;
            letter-spacing: -1.5px;
            background: linear-gradient(180deg, #ffffff 0%, #e0e0e0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-subtitle {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-bottom: 35px;
            font-weight: 400;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.6;
        }

        /* Buscador Modernizado dentro de la Portada */
        .search-container {
            max-width: 550px;
            margin: 0 auto 30px auto;
            position: relative;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            border-radius: 30px;
        }

        .search-bar {
            width: 100%;
            padding: 18px 25px;
            border-radius: 30px;
            border: 1px solid #2a2a2a;
            background-color: rgba(30, 30, 30, 0.85);
            color: white;
            font-size: 1.1rem;
            outline: none;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .search-bar:focus {
            background-color: #222222;
            border-color: var(--accent-color);
            box-shadow: 0 0 15px rgba(29, 185, 84, 0.3);
        }

        /* Stats Rápidos de la Portada */
        .hero-stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .stat-item {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .stat-item strong {
            color: var(--text-main);
            font-size: 1.1rem;
        }

        /* SECCIÓN DE FILTROS Y LIGAS */
        .section-ligas {
            max-width: 1200px;
            margin: 40px auto 20px auto;
            padding: 0 20px;
        }

        .section-title {
            font-size: 1.4rem;
            font-weight: 800;
            margin-bottom: 15px;
            letter-spacing: -0.5px;
            text-transform: uppercase;
            color: #f5f5f5;
            border-left: 4px solid var(--accent-color);
            padding-left: 12px;
        }

        .tabs-container {
            display: flex;
            overflow-x: auto;
            gap: 12px;
            padding: 5px 0 15px 0;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .tabs-container::-webkit-scrollbar {
            display: none;
        }

        .tab {
            background-color: #1c1c1c;
            color: var(--text-main);
            border: 1px solid #252525;
            padding: 12px 26px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 700;
            white-space: nowrap;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .tab.active, .tab:hover {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
            color: #000;
            box-shadow: 0 4px 12px rgba(29, 185, 84, 0.2);
        }

        /* Grilla de Estadios */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            padding: 0 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Tarjeta de Estadio */
        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s, background-color 0.3s;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            border: 1px solid #1f1f1f;
        }

        .card:hover {
            background-color: #1f1f1f;
            transform: translateY(-5px);
            border-color: #2d2d2d;
        }

        .estadio-foto-container {
            width: 100%;
            height: 180px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 25px;
            transition: filter 0.3s;
        }

        .card:hover .estadio-foto-container {
            filter: brightness(1.15);
        }

        .card-img-logo {
            max-height: 85%;
            max-width: 85%;
            object-fit: contain;
            filter: drop-shadow(0px 12px 18px rgba(0,0,0,0.7));
            transition: transform 0.3s ease-out;
            z-index: 2;
        }

        .card:hover .card-img-logo {
            transform: scale(1.08) rotate(2deg);
        }

        .estadio-foto-container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(0deg, rgba(22,22,22,0.9) 0%, rgba(0,0,0,0.2) 100%);
            z-index: 1;
        }

        .placeholder-text {
            color: rgba(255,255,255,0.15);
            font-weight: 900;
            font-size: 1.3rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-align: center;
            padding: 0 10px;
            z-index: 2;
        }

        .card-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            z-index: 2;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 5px;
            letter-spacing: -0.3px;
        }

        .card-subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 15px;
        }

        .btn-view {
            display: inline-block;
            width: 100%;
            padding: 12px;
            background-color: var(--accent-color);
            color: #000;
            text-align: center;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            transition: background 0.3s;
            margin-top: auto;
        }

        .btn-view:hover {
            background-color: var(--accent-hover);
        }

        /* Botón Ruleta Flotante */
        .btn-random {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: var(--danger-color);
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(229, 9, 20, 0.4);
            transition: transform 0.2s;
            z-index: 1000;
        }

        .btn-random:hover {
            transform: scale(1.05);
        }
    </style>
</head>

            "SC Paderborn": "linear-gradient(135deg, #00529f, #ffffff, #000000)",
            "SV Elversberg": "linear-gradient(135deg, #ffffff, #000000, #ffcc00)"
        };

        function obtenerFondoClub(nombreClub) {
            if (coloresClubes[nombreClub]) return coloresClubes[nombreClub];
            return "linear-gradient(135deg, #1f1f1f, #333333)";
        }

        // Función unificada para pintar las tarjetas en la grilla
        function renderizarTarjetas(listaEstadios) {
            const grilla = document.querySelector('.grid');
            grilla.innerHTML = ''; 

            if (listaEstadios.length === 0) {
                grilla.innerHTML = '<h3 style="color:var(--text-muted); text-align:center; width:100%; padding:40px;">No se encontraron estadios que coincidan con la búsqueda.</h3>';
                return;
            }
            
            listaEstadios.forEach(fila => {
                const urlFoto = fila.Foto ? fila.Foto.trim() : '';
                const clubNombre = fila.Club.trim();
                const fondoGradiente = obtenerFondoClub(clubNombre);
                
                const tarjeta = `
                <article class="card">
                    <div class="estadio-foto-container" style="background: ${fondoGradiente};">
                        ${urlFoto ? 
                            `<img class="card-img-logo" src="${urlFoto}" alt="Escudo de ${clubNombre}" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">` : 
                            ''
                        }
                        <div class="placeholder-text" style="${urlFoto ? 'display: none;' : 'display: block;'}">
                            ${clubNombre}
                        </div>
                    </div>
                    <div class="card-content">
                        <h2 class="card-title">${fila.Estadio}</h2>
                        <p class="card-subtitle">${clubNombre} • ${fila.País || 'Argentina'}</p>
                        <p style="font-size: 0.85rem; color: #b3b3b3; margin-bottom: 15px; line-height: 1.4; flex-grow: 1;">${fila['Dato Curioso'] || ''}</p>
                        <a href="${fila['Link del Video'] || '#'}" target="_blank" class="btn-view">Ver Vuelo 3D</a>
                    </div>
                </article>`;
                grilla.innerHTML += tarjeta;
            });
        }

        // Función central para cargar e indexar cualquier pestaña usando su GID
        function cargarLiga(gid) {
            const grilla = document.querySelector('.grid');
            grilla.innerHTML = '<h3 style="color:var(--text-muted); text-align:center; width:100%; padding:40px;">Cargando estadios...</h3>';
            
            // Limpiamos la barra de búsqueda al cambiar de liga
            document.getElementById('global-search').value = '';

            const urlCompleta = `${baseSpreadsheetUrl}&gid=${gid}`;

            Papa.parse(urlCompleta, {
                download: true,
                header: true, 
                complete: function(results) {
                    // Guardamos en memoria interna solo las filas válidas
                    estadiosCargados = results.data.filter(fila => fila.Estadio && fila.Club);
                    renderizarTarjetas(estadiosCargados);
                },
                error: function(err) {
                    grilla.innerHTML = '<h2 style="color:white; text-align:center; padding: 40px;">Error al conectar con esta liga. Verificá el GID de la pestaña.</h2>';
                }
            });
        }

        // MOTOR DE BÚSQUEDA: Filtro dinámico en tiempo real
        document.getElementById('global-search').addEventListener('input', function(e) {
            const terminoBusqueda = e.target.value.toLowerCase().trim();
            
            const estadiosFiltrados = estadiosCargados.filter(fila => {
                const estadio = (fila.Estadio || '').toLowerCase();
                const club = (fila.Club || '').toLowerCase();
                return estadio.includes(terminoBusqueda) || club.includes(terminoBusqueda);
            });

            renderizarTarjetas(estadiosFiltrados);
        });

        // MOTOR DE RULETA: Vuelo Aleatorio de la pestaña activa
        document.querySelector('.btn-random').addEventListener('click', function() {
            if (estadiosCargados.length === 0) return;

            // Filtramos estadios que tengan links de video válidos y no vacíos
            const estadiosConVideo = estadiosCargados.filter(fila => {
                const link = fila['Link del Video'];
                return link && link.trim() !== '' && !link.includes('[Pegá tu link');
            });

            if (estadiosConVideo.length === 0) {
                alert('Aún no hay links de videos disponibles en esta liga para simular el vuelo aleatorio.');
                return;
            }

            const indiceAzar = Math.floor(Math.random() * estadiosConVideo.length);
            const estadioElegido = estadiosConVideo[indiceAzar];

            window.open(estadioElegido['Link del Video'].trim(), '_blank');
        });

        // Eventos de interacción de las pestañas
        document.querySelectorAll('.tab').forEach(boton => {
            boton.addEventListener('click', function() {
                document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                
                const gidId = this.getAttribute('data-gid');
                cargarLiga(gidId);
            });
        });

        // Carga inicial automática (Primera División)
        const primerGid = document.querySelector('.tab.active').getAttribute('data-gid');
        cargarLiga(primerGid);
    </script>
</body>
</html>
