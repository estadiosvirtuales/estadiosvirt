<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estadios Virtuales | El Mundo Desde el Aire</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>
        /* Variables de colores (Estilo Modo Oscuro Premium) */
        :root {
            --bg-color: #0c0c0c;
            --card-bg: #161616;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --accent-color: #1db954; /* Verde estilo Spotify */
            --accent-hover: #1ed760;
            --danger-color: #1db954; /* Rojo estilo Netflix */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-bottom: 50px;
        }

        /* PORTADA CINEMÁTICA CON IDENTIDAD OPTIMIZADA */
        .hero-section {
            position: relative;
            padding: 60px 20px 40px 20px;
            text-align: center;
            background: linear-gradient(180deg, rgba(29, 185, 84, 0.12) 0%, rgba(20, 20, 20, 0.6) 50%, var(--bg-color) 100%), 
                        radial-gradient(circle at top, #1a3a21 0%, #0c0c0c 70%);
            border-bottom: 1px solid #1a1a1a;
        }

        .hero-content {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Logo optimizado */
        .brand-logo {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid var(--accent-color);
            box-shadow: 0 4px 20px rgba(29, 185, 84, 0.3), inset 0 0 15px rgba(0,0,0,0.5);
            margin-bottom: 18px;
            transition: transform 0.3s ease;
        }

        .brand-logo:hover {
            transform: scale(1.04) rotate(2deg);
        }

        .hero-section h1 {
            font-size: 2.3rem;
            font-weight: 900;
            margin-bottom: 15px;
            letter-spacing: -0.5px;
            background: linear-gradient(180deg, #ffffff 0%, #e0e0e0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-subtitle {
            font-size: 1.15rem;
            color: var(--text-muted);
            margin-bottom: 30px;
            font-weight: 400;
            max-width: 600px;
            line-height: 1.6;
        }

        /* Buscador */
        .search-container {
            width: 100%;
            max-width: 550px;
            margin: 0 auto 25px auto;
            position: relative;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            border-radius: 30px;
        }

        .search-bar {
            width: 100%;
            padding: 16px 25px;
            border-radius: 30px;
            border: 1px solid #2a2a2a;
            background-color: rgba(30, 30, 30, 0.85);
            color: white;
            font-size: 1.05rem;
            outline: none;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .search-bar:focus {
            background-color: #222222;
            border-color: var(--accent-color);
            box-shadow: 0 0 15px rgba(29, 185, 84, 0.3);
        }

        /* BOTONERA EN LA CABECERA */
        .hero-action-buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 15px;
            flex-wrap: wrap;
            width: 100%;
        }
        .hero-btn {
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .hero-btn.primary {
            background-color: var(--accent-color);
            color: #000;
            box-shadow: 0 4px 15px rgba(29, 185, 84, 0.3);
        }
        .hero-btn.primary:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(29, 185, 84, 0.5);
        }
        .hero-btn.secondary {
            background-color: #1a1a1a;
            color: #fff;
            border: 1px solid #333;
        }
        .hero-btn.secondary:hover {
            background-color: #252525;
            border-color: var(--accent-color);
            transform: translateY(-2px);
        }
        
        #hero-google-profile {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
        }

        .hero-profile-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 2px solid var(--accent-color);
            cursor: pointer;
            box-shadow: 0 0 12px rgba(29, 185, 84, 0.4);
            transition: transform 0.2s ease;
            object-fit: cover;
        }
        .hero-profile-avatar:hover {
            transform: scale(1.1);
        }

        /* SECCIÓN DE FILTROS Y BANDERAS PREMIUM */
        .section-ligas {
            max-width: 1200px;
            margin: 35px auto 20px auto;
            padding: 0 20px;
        }

        .section-title {
            font-size: 1.3rem;
            font-weight: 800;
            margin-bottom: 15px;
            letter-spacing: -0.5px;
            text-transform: uppercase;
            color: #f5f5f5;
            border-left: 4px solid var(--accent-color);
            padding-left: 12px;
        }

        .tabs-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 5px 0 15px 0;
            justify-content: center;
        }

        /* DISEÑO DE BOTONES CON BANDERAS INTEGRADAS */
        .tab {
            color: #ffffff;
            border: 2px solid #252525;
            padding: 10px 22px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 800;
            white-space: nowrap;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            text-shadow: 2px 2px 4px #000, -1px -1px 4px #000, 0px 0px 8px #000;
            background-color: #1c1c1c;
            background-size: 100% 100%;
            background-position: center;
            position: relative;
            box-shadow: inset 0 0 0 1000px rgba(0,0,0,0.55);
        }

        .tab.active, .tab:hover {
            border-color: var(--accent-color);
            box-shadow: inset 0 0 0 1000px rgba(0,0,0,0.15), 0 4px 15px rgba(29, 185, 84, 0.4);
            transform: translateY(-2px);
            color: #ffffff;
        }

        /* ASIGNACIÓN DE BANDERAS POR GID */
        .tab[data-gid="0"], .tab[data-gid="861264971"] { background-image: linear-gradient(180deg, #75aadb 33%, #ffffff 33%, #ffffff 66%, #75aadb 66%); }
        .tab[data-gid="554922783"] { background-image: linear-gradient(90deg, #ffffff 42%, #ce1124 42%, #ce1124 58%, #ffffff 58%); }
        .tab[data-gid="88250864"] { background-image: linear-gradient(180deg, #aa151b 25%, #f1bf00 25%, #f1bf00 75%, #aa151b 75%); }
        .tab[data-gid="2013531070"] { background-image: linear-gradient(90deg, #009246 33%, #ffffff 33%, #ffffff 66%, #ce2b37 66%); }
        .tab[data-gid="165565330"] { background-image: linear-gradient(90deg, #002395 33%, #ffffff 33%, #ffffff 66%, #ed2939 66%); }
        .tab[data-gid="96716546"] { background-image: linear-gradient(180deg, #000000 33%, #dd0000 33%, #dd0000 66%, #ffce00 66%); }
        .tab[data-gid="58862486"] { background-image: linear-gradient(135deg, #009c3b 40%, #ffdf00 50%, #009c3b 60%); }
        .tab[data-gid="304687071"] { background-image: linear-gradient(180deg, #0039a6 50%, #d52b1e 50%); }
        .tab[data-gid="879164460"] { background-image: linear-gradient(135deg, #006341 33%, #ffffff 33%, #ffffff 66%, #b31942 66%); }

        /* Grilla de Estadios */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            padding: 0 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s, background-color 0.3s;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            border: 1px solid #1f1f1f;
        }

        .card:hover {
            background-color: #1f1f1f;
            transform: translateY(-5px);
            border-color: #2d2d2d;
        }

        .estadio-foto-container {
            width: 100%;
            height: 180px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 25px;
            transition: filter 0.3s;
        }

        .card:hover .estadio-foto-container {
            filter: brightness(1.15);
        }

        .card-img-logo {
            max-height: 85%;
            max-width: 85%;
            object-fit: contain;
            filter: drop-shadow(0px 8px 12px rgba(0,0,0,0.8));
            transition: transform 0.3s ease-out;
            z-index: 2;
        }

        .card:hover .card-img-logo {
            transform: scale(1.08) rotate(2deg);
        }

        .estadio-foto-container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(0deg, rgba(22,22,22,0.9) 0%, rgba(0,0,0,0.2) 100%);
            z-index: 1;
        }

        .placeholder-text {
            color: rgba(255,255,255,0.15);
            font-weight: 900;
            font-size: 1.3rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-align: center;
            padding: 0 10px;
            z-index: 2;
        }

        .trivia-hint {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.6);
            color: var(--accent-color);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            z-index: 4;
            border: 1px solid rgba(29, 185, 84, 0.2);
            backdrop-filter: blur(4px);
            transition: all 0.3s;
        }

        .card:hover .trivia-hint {
            background: var(--accent-color);
            color: #000;
            box-shadow: 0 0 10px var(--accent-color);
        }

        /* GLOBO EMERGENTE CON PESTAÑAS (TRIVIA / MAPA) */
        .trivia-balloon {
            position: absolute;
            top: 8px;
            left: 8px;
            right: 8px;
            bottom: 8px;
            background: rgba(16, 16, 16, 0.98);
            border: 1px solid var(--accent-color);
            border-radius: 8px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transform: scale(0.92);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
        }

        .trivia-balloon.active {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1);
            box-shadow: 0 8px 24px rgba(0,0,0,0.8);
        }

        .balloon-tabs {
            display: flex;
            width: 100%;
            border-bottom: 1px solid #333;
            margin-bottom: 8px;
            flex-shrink: 0;
        }

        .b-tab {
            flex: 1;
            background: transparent;
            color: var(--text-muted);
            border: none;
            padding: 6px 0;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .b-tab.active {
            color: var(--accent-color);
            border-bottom: 2px solid var(--accent-color);
        }

        .b-content {
            display: none;
            width: 100%;
            height: 100%;
            overflow-y: auto;
            color: var(--text-main);
            font-size: 0.85rem;
            line-height: 1.4;
            text-align: center;
            align-items: center;
            justify-content: center;
        }

        .b-content.active {
            display: flex;
        }

        #game-ui .b-mapa {
            width: 100%;
            height: 100%;
            display: none;
        }
        
        #game-ui .b-mapa.active {
            display: block !important;
        }

        .card-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            z-index: 2;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 5px;
            letter-spacing: -0.3px;
        }

        .card-subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 15px;
        }

        .btn-view {
            display: inline-block;
            width: 100%;
            padding: 12px;
            background-color: var(--accent-color);
            color: #000;
            text-align: center;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: auto;
        }

        .btn-view:hover {
            background-color: var(--accent-hover);
        }

        /* Estilos del panel del minijuego GeoGuessr RECONFIGURADO ESTILO WORLDGUESSR */
        #game-ui {
            display: none;
            width: 100%;
            background: linear-gradient(135deg, #121f15 0%, #0e0e0e 100%) !important;
            padding: 20px !important;
            border-top: none !important;
            text-align: center;
            z-index: 2010;
            backdrop-filter: blur(12px);
            border-radius: 0 0 12px 12px;
        }
        #game-title {
            font-size: 1.1rem !important;
            color: #ffffff;
            margin-bottom: 15px;
            font-weight: 800 !important;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: rgba(29, 185, 84, 0.1);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(29, 185, 84, 0.2);
        }
        #map-guess-container {
            width: 100%;
            height: 260px;
            background-color: #0c0c0c;
            border-radius: 12px !important;
            border: 2px solid #252525;
            margin-bottom: 15px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.9);
            transition: border-color 0.3s ease;
        }
        #map-guess-container:hover {
            border-color: var(--accent-color);
        }
        #game-action-btn {
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 800 !important;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            border-radius: 30px !important;
            transition: all 0.3s ease !important;
        }

        /* Estilos del Modal Reconfigurados */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            position: relative;
            width: 90%;
            max-width: 550px; 
            height: 80vh;
            background: #000;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(29, 185, 84, 0.4);
            border: 1px solid var(--accent-color);
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }

        .modal-content.stadium-guessr-layout {
            width: 85% !important;
            max-width: 1100px !important; 
        }

        .video-container {
            width: 100%;
            height: 100%;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
        }

        /* Split-screen inteligente */
        @media (min-width: 769px) {
            .modal-content.stadium-guessr-layout {
                flex-direction: row !important;
            }
            .modal-content.stadium-guessr-layout .video-container {
                width: 55% !important;
                height: 100% !important;
                border-radius: 12px 0 0 12px !important;
                backdrop-filter: blur(4px) brightness(0.7);
            }
            .modal-content.stadium-guessr-layout #game-ui {
                width: 45% !important;
                height: 100% !important;
                border-top: none !important;
                border-left: 2px solid rgba(29, 185, 84, 0.3) !important;
                display: flex !important;
                flex-direction: column !important;
                justify-content: space-between !important;
                border-radius: 0 12px 12px 0 !important;
                padding: 24px !important;
                box-shadow: -10px 0 30px rgba(0,0,0,0.5);
            }
            .modal-content.stadium-guessr-layout #map-guess-container {
                flex-grow: 1 !important;
                height: 100% !important;
                min-height: 350px !important;
            }
        }

        /* Adaptación táctil balanceada */
        @media (max-width: 768px) {
            .hero-section { padding: 40px 15px 25px 15px; }
            .brand-logo { width: 90px; height: 90px; margin-bottom: 12px; }
            .hero-section h1 { font-size: 1.8rem; }
            .hero-subtitle { font-size: 1rem; margin-bottom: 20px; }
            .grid { grid-template-columns: 1fr; gap: 20px; padding: 0 15px; }
            .estadio-foto-container { height: 200px; }
            
            .modal-content.stadium-guessr-layout .video-container {
                height: 45% !important;
            }
            .modal-content.stadium-guessr-layout #game-ui {
                height: 55% !important;
                padding: 15px !important;
                display: flex !important;
                flex-direction: column !important;
                justify-content: space-between !important;
            }
            .modal-content.stadium-guessr-layout #map-guess-container {
                flex-grow: 1 !important;
                height: 100% !important;
                min-height: 200px;
            }
        }

        .leaflet-popup-content-wrapper {
            background: #161616 !important;
            color: #ffffff !important;
            border: 1px solid var(--accent-color);
        }
        .leaflet-popup-tip {
            background: #161616 !important;
        }

        .rating-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid #222;
        }
        .rating-title {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }
        .stars-row {
            display: flex;
            gap: 4px;
        }
        .star-icon {
            font-size: 1.4rem;
            color: #333333;
            cursor: pointer;
            transition: transform 0.1s ease, color 0.2s ease;
            user-select: none;
        }
        .star-icon:hover {
            transform: scale(1.15);
        }
        .star-icon.active {
            color: var(--accent-color) !important;
        }
        .star-icon.half-active {
            background: linear-gradient(90deg, var(--accent-color) 50%, #333333 50%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .split-profile-layout {
            display: flex;
            flex-direction: column;
            gap: 30px;
            width: 100%;
        }
        @media (min-width: 769px) {
            .split-profile-layout {
                flex-direction: row;
                align-items: stretch;
            }
            .left-fut-column {
                width: 38%;
                display: flex;
                justify-content: center;
                align-items: center;
                border-right: 1px solid #222;
                padding-right: 25px;
            }
            .right-dashboard-column {
                width: 62%;
                display: flex;
                flex-direction: column;
                justify-content: space-between;
            }
        }

        .fut-card {
            position: relative;
            width: 250px;
            height: 380px;
            background-size: cover;
            border-radius: 15px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #000;
            font-family: 'Arial Black', Gadget, sans-serif;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            overflow: hidden;
            user-select: none;
        }
        .fut-card.bronze {
            background: linear-gradient(135deg, #a855f7 0%, #7e22ce 50%, #3b0764 100%), linear-gradient(135deg, #b45309, #78350f);
            border: 3px solid #92400e;
            color: #fef3c7;
        }
        .fut-card.silver {
            background: linear-gradient(135deg, #9ca3af 0%, #4b5563 50%, #1f2937 100%);
            border: 3px solid #9ca3af;
            color: #ffffff;
        }
        .fut-card.gold {
            background: linear-gradient(135deg, #eab308 0%, #ca8a04 40%, #16a34a 80%, #0c0c0c 100%);
            border: 3px solid #facc15;
            color: #fff;
            box-shadow: 0 0 15px rgba(234,179,8,0.4);
            animation: goldShine 4s infinite alternate;
        }
        @keyframes goldShine {
            0% { box-shadow: 0 0 15px rgba(234,179,8,0.4); }
            100% { box-shadow: 0 0 30px rgba(29,185,84,0.7); }
        }
        
        .fut-top {
            display: flex;
            width: 100%;
            height: 55%;
            margin-top: 15px;
        }
        .fut-badge-meta {
            width: 30%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            line-height: 1.1;
        }
        .fut-ovr {
            font-size: 2.2rem;
            font-weight: 900;
        }
        .fut-pos {
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            opacity: 0.8;
        }
        .fut-club-icon {
            width: 28px;
            height: 28px;
            margin-top: 8px;
            object-fit: contain;
        }
        
        .fut-avatar-container {
            width: 70%;
            height: 100%;
            position: relative;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            overflow: hidden;
        }
        .fut-user-img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            z-index: 5;
            margin-bottom: 25px;
            border: 2px solid rgba(255,255,255,0.2);
        }
        .fut-jersey-overlay {
            position: absolute;
            bottom: 0;
            width: 100px;
            height: 50px;
            background: linear-gradient(0deg, #111 0%, #222 100%);

            for (let k in obj) {

                    return obj[k];

            for (let k in obj) {
                if (k.toLowerCase().includes(claveLimpia)) {
                    return obj[k];
                }
            }
            return obj[claveBuscada] || '';

        function cargarLiga(gid) {
            const grilla = document.querySelector('.grid');
            grilla.innerHTML = '<h3 style="color:var(--text-muted); text-align:center; width:100%; padding:40px;">Cargando estadios...</h3>';
            document.getElementById('global-search').value = '';

            Papa.parse(`${baseSpreadsheetUrl}&gid=${gid}`, {
                download: true,
                header: true, 
                complete: function(results) {
                    estadiosCargados = results.data.filter(fila => bscarPropiedad(fila, 'Estadio') && bscarPropiedad(fila, 'Club'));
                    renderizarTarjetas(estadiosCargados);
                }
            });
        }

        function indexarCatalogoMasivo() {
            catalogoGlobal = []; 
            todosLosGids.forEach(gid => {
                Papa.parse(`${baseSpreadsheetUrl}&gid=${gid}`, {
                    download: true,
                    header: true,
                    complete: function(results) {
                        results.data.filter(fila => bscarPropiedad(fila, 'Estadio') && bscarPropiedad(fila, 'Club')).forEach(estadio => {
                            const eName = bscarPropiedad(estadio, 'Estadio');
                            const cName = bscarPropiedad(estadio, 'Club');
                            if (!catalogoGlobal.some(e => bscarPropiedad(e, 'Estadio') === eName && bscarPropiedad(e, 'Club') === cName)) {
                                catalogoGlobal.push(estadio);
                            }
                        });
                    }
                });
            });
        }

        document.getElementById('global-search').addEventListener('input', function(e) {
            const terminoBusqueda = e.target.value.toLowerCase().trim();
            if (terminoBusqueda === '') {
                document.getElementById('titulo-grilla').innerText = "Seleccioná una Categoría";
                renderizarTarjetas(estadiosCargados);
            } else {
                document.getElementById('titulo-grilla').innerText = "Resultados del Catálogo Masivo";
                const estadiosFiltrados = catalogoGlobal.filter(fila => {
                    const estadio = bscarPropiedad(fila, 'Estadio').toLowerCase();
                    const club = bscarPropiedad(fila, 'Club').toLowerCase();
                    const pais = bscarPropiedad(fila, 'País').toLowerCase();
                    return estadio.includes(terminoBusqueda) || club.includes(terminoBusqueda) || pais.includes(terminoBusqueda);
                });
                renderizarTarjetas(estadiosFiltrados);
            }
        });

        function dispararVueloAleatorio(e) {
            const poolDeEstadios = catalogoGlobal.length > 0 ? catalogoGlobal : estadiosCargados;
            
            if (poolDeEstadios.length === 0) {
                alert('Esperá un segundo a que se termine de sincronizar el catálogo de estadios en memoria...');
                return;
            }

            const estadiosConVideo = poolDeEstadios.filter(fila => {
                const link = bscarPropiedad(fila, 'Link del Video').toString().trim();
                return (link.includes('youtube.com') || link.includes('youtu.be')) && !link.includes('[Pegá tu link');
            });

            if (estadiosConVideo.length === 0) {
                alert('Aún no hay links de videos de YouTube disponibles para disparar la simulación de vuelo aleatorio.');
                return;
            }

            const indiceAzar = Math.floor(Math.random() * estadiosConVideo.length);
            const estadioElegido = estadiosConVideo[indiceAzar];
            abrirModalVideo(e, bscarPropiedad(estadioElegido, 'Link del Video').trim(), false);
        }

        function iniciarTrivia() {
            if (catalogoGlobal.length === 0) {
                alert('Esperá un segundo a que cargue todo el catálogo de estadios...');
                return;
            }

            guessrRondaActual = 1;
            guessrPuntosTotales = 0;
            guessrEstadiosJugados = [];
            guessrHistorialRondas = []; // Limpiamos el historial al empezar partida nueva

            lanzarRondaGuessr();
        }

        function lanzarRondaGuessr() {
            const estadiosDisponibles = catalogoGlobal.filter(f => {
                const link = bscarPropiedad(f, 'Link del Video').toString().trim();
                const esYouTube = link.includes('youtube.com') || link.includes('youtu.be');
                const tieneLat = bscarPropiedad(f, 'Latitud').toString().trim() !== '';
                const tieneLng = bscarPropiedad(f, 'Longitud').toString().trim() !== '';
                const yaJugado = guessrEstadiosJugados.includes(bscarPropiedad(f, 'Estadio'));
                return esYouTube && tieneLat && tieneLng && !yaJugado;
            });

            if (estadiosDisponibles.length === 0) {
                alert('¡Felicidades! Completaste todas las georreferencias disponibles en este lote.');
                cerrarModalVideo();
                return;
            }

            guessrEstadioCorrecto = estadiosDisponibles[Math.floor(Math.random() * estadiosDisponibles.length)];
            guessrEstadiosJugados.push(bscarPropiedad(guessrEstadioCorrecto, 'Estadio'));
            guessrSelectedLatLng = null;

            document.getElementById('game-title').innerHTML = `RONDA ${guessrRondaActual} DE 5 • SCORE: ${guessrPuntosTotales} PTS`;
            const actionBtn = document.getElementById('game-action-btn');
            actionBtn.innerText = "Clavá un pin en el mapa mudo 📍";
            actionBtn.style.backgroundColor = "var(--card-bg)";
            actionBtn.style.color = "var(--text-muted)";
            actionBtn.disabled = true;

            abrirModalVideo(null, bscarPropiedad(guessrEstadioCorrecto, 'Link del Video').trim(), true);

            setTimeout(() => {
                if (guessrMapInstance) {
                    guessrMapInstance.remove();
                }

                guessrMapInstance = L.map('map-guess-container', {
                    attributionControl: false,
                    zoomControl: false
                }).setView([20, 0], 1);

                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    maxZoom: 18
                }).addTo(guessrMapInstance);

                guessrMapInstance.on('click', function(e) {
                    if (actionBtn.getAttribute('data-estado') === 'resultado') return;

                    guessrSelectedLatLng = e.latlng;

                    if (guessrUserMarker) {
                        guessrUserMarker.setLatLng(guessrSelectedLatLng);
                    } else {
                        guessrUserMarker = L.marker(guessrSelectedLatLng).addTo(guessrMapInstance);
                    }

                    actionBtn.innerText = "Confirmar Ubicación 🚀";
                    actionBtn.style.backgroundColor = "var(--accent-color)";
                    actionBtn.style.color = "#000";
                    actionBtn.disabled = false;
                });

                guessrMapInstance.invalidateSize();
            }, 400);

            actionBtn.setAttribute('data-estado', 'juego');
            actionBtn.onclick = function() {
                if (this.getAttribute('data-estado') === 'juego') {
                    procesarArriesgoGuessr();
                } else {
                    avanzarDeRondaGuessr();
                }
            };
        }

        function procesarArriesgoGuessr() {
            const actionBtn = document.getElementById('game-action-btn');
            actionBtn.setAttribute('data-estado', 'resultado');

            const targetLat = parseFloat(String(bscarPropiedad(guessrEstadioCorrecto, 'Latitud')).trim().replace(',', '.'));
            const targetLng = parseFloat(String(bscarPropiedad(guessrEstadioCorrecto, 'Longitud')).trim().replace(',', '.'));

            const userLat = guessrSelectedLatLng.lat;
            const userLng = guessrSelectedLatLng.lng;

            const distanciaKm = calcularDistanciaHaversine(userLat, userLng, targetLat, targetLng);
            
            const puntosRonda = isNaN(distanciaKm) ? 0 : Math.max(0, Math.round(5000 * Math.pow(Math.E, -distanciaKm / 1200)));
            guessrPuntosTotales += puntosRonda;

            // Guardamos el historial detallado de la ronda actual antes de avanzar
            guessrHistorialRondas.push({
                ronda: guessrRondaActual,
                estadio: bscarPropiedad(guessrEstadioCorrecto, 'Estadio'),
                distancia: distanciaKm,
                puntos: puntosRonda
            });

            if (!isNaN(distanciaKm) && distanciaKm < 5) {
                userStats.medallaLocalista = true;
                guardarStats();
            }

            guessrTargetMarker = L.circleMarker([targetLat, targetLng], {
                radius: 8,
                color: 'var(--accent-color)',
                fillColor: '#000',
                fillOpacity: 1,
                weight: 3
            }).addTo(guessrMapInstance).bindPopup(`<b style="color:#ffffff;">${bscarPropiedad(guessrEstadioCorrecto, 'Estadio')}</b><br><span style="color:var(--text-muted);">${bscarPropiedad(guessrEstadioCorrecto, 'Club')}</span>`).openPopup();

            guessrPolyline = L.polyline([[userLat, userLng], [targetLat, targetLng]], {
                color: 'var(--danger-color)',
                weight: 2,
                dashArray: '5, 8'
            }).addTo(guessrMapInstance);

            const bounds = L.featureGroup([guessrUserMarker, guessrTargetMarker]).getBounds();
            guessrMapInstance.fitBounds(bounds, { padding: [40, 40] });

            document.getElementById('game-title').innerHTML = `RONDA ${guessrRondaActual} DE 5 • SCORE: ${guessrPuntosTotales} PTS`;
            actionBtn.innerHTML = `Le erraste por <b>${isNaN(distanciaKm) ? '?' : distanciaKm.toFixed(1)} km</b>. (+${puntosRonda} pts) • Siguiente ➡️`;
            actionBtn.style.backgroundColor = "var(--danger-color)";
            actionBtn.style.color = "white";
        }

        function avanzarDeRondaGuessr() {
            if (guessrUserMarker) guessrUserMarker.remove();
            if (guessrTargetMarker) guessrTargetMarker.remove();
            if (guessrPolyline) guessrPolyline.remove();
            guessrUserMarker = null;
            guessrTargetMarker = null;
            guessrPolyline = null;

            guessrRondaActual++;
            if (guessrRondaActual <= 5) {
                lanzarRondaGuessr();
            } else {
                finalizarJuegoGuessr();
            }
        }

        function enviarMiPuntaje() {
            let nombre = "";
            const loggedUser = JSON.parse(localStorage.getItem('ev_user_logged'));
            if (loggedUser && loggedUser.name) {
                nombre = loggedUser.name;
            } else {
                nombre = prompt("No iniciaste sesión con Google. Ingresá tu nombre para el ranking global:");
            }
            if (!nombre || nombre.trim() === "") return;

            const payload = { nombre: nombre.trim(), puntaje: guessrPuntosTotales };

            fetch(scriptUrlVotos, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            })
            .then(() => alert("¡Tu marca de " + guessrPuntosTotales + " pts fue enviada con éxito al salón de la fama global! 🚀"))
            .catch(err => alert("Error al enviar el puntaje. Reintentá en unos momentos."));
        }

        function calcularDistanciaHaversine(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c; 
        }

        function inicializarGoogleLogin() {
            google.accounts.id.initialize({
                client_id: "351786523914-placeholder.apps.googleusercontent.com", 
                callback: manejarRespuestaGoogle
            });
            renderizarBotonLogin();
        }

        function renderizarBotonLogin() {
            const container = document.getElementById('hero-google-profile');
            const loggedUser = JSON.parse(localStorage.getItem('ev_user_logged'));
            
            if (loggedUser) {
                container.innerHTML = `<img src="${loggedUser.picture}" class="hero-profile-avatar" onclick="abrirModalPerfil()" title="Ver mi Perfil Premium FUT">`;
            } else {
                if (typeof google !== 'undefined' && google.accounts) {
                    container.innerHTML = `<div id="google-login-btn"></div>`;
                    google.accounts.id.renderButton(
                        document.getElementById("google-login-btn"),
                        { theme: "dark", size: "large", type: "standard", shape: "pill" }
                    );
                } else {
                    setTimeout(renderizarBotonLogin, 300);
                }
            }
        }

        function manejarRespuestaGoogle(response) {
            const payload = decodeJwt(response.credential);
            if (payload) {
                const user = {
                    id: payload.sub,
                    name: payload.name,
                    email: payload.email,
                    picture: payload.picture
                };
                localStorage.setItem('ev_user_logged', JSON.stringify(user));
                renderizarBotonLogin();
            }
        }

        function decodeJwt(token) {
            try {
                var base64Url = token.split('.')[1];
                var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                return JSON.parse(jsonPayload);
            } catch(e) { return null; }
        }
