<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estadios Virtuales | El Mundo Desde el Aire</title>
    <style>
        /* Variables de colores (Estilo Modo Oscuro Premium) */
        :root {
            --bg-color: #121212;
            --card-bg: #181818;
            --text-main: #ffffff;
            --text-muted: #b3b3b3;
            --accent-color: #1db954; /* Verde estilo Spotify */
            --accent-hover: #1ed760;
            --danger-color: #e50914; /* Rojo estilo Netflix */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-bottom: 50px;
        }

        /* Cabecera y Buscador */
        .header {
            padding: 30px 20px;
            text-align: center;
            background: linear-gradient(180deg, #282828 0%, var(--bg-color) 100%);
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .search-container {
            max-width: 600px;
            margin: 0 auto;
        }

        .search-bar {
            width: 100%;
            padding: 15px 20px;
            border-radius: 30px;
            border: none;
            background-color: #2a2a2a;
            color: white;
            font-size: 1.1rem;
            outline: none;
            transition: background-color 0.3s;
        }

        .search-bar:focus {
            background-color: #333333;
        }

        /* Pestañas de Ligas */
        .tabs-container {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            padding: 10px 20px;
            margin-bottom: 20px;
            /* Ocultar scrollbar */
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .tabs-container::-webkit-scrollbar {
            display: none;
        }

        .tab {
            background-color: #2a2a2a;
            color: var(--text-main);
            border: none;
            padding: 10px 24px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            white-space: nowrap;
            transition: background 0.3s;
        }

        .tab.active, .tab:hover {
            background-color: var(--accent-color);
            color: #000;
        }

        /* Grilla de Estadios */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            padding: 0 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Tarjeta de Estadio */
        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s, background-color 0.3s;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            background-color: #282828;
            transform: translateY(-5px);
        }

        /* Contenedor Premium de la imagen/escudo */
        .estadio-foto-container {
            width: 100%;
            height: 180px;
            background: linear-gradient(135deg, #1e1e1e, #2a2a2a);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 15px;
        }

        .card-img-logo {
            max-height: 85%;
            max-width: 85%;
            object-fit: contain;
            filter: drop-shadow(0px 8px 12px rgba(0,0,0,0.6));
            transition: transform 0.3s;
        }

        .card:hover .card-img-logo {
            transform: scale(1.05);
        }

        .placeholder-text {
            color: #444;
            font-weight: 800;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
            padding: 0 10px;
        }

        .card-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .card-subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 15px;
        }

        /* Sistema de Estrellas */
        .rating {
            color: #f5c518; /* Amarillo IMDb */
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        /* Botón de Acción */
        .btn-view {
            display: inline-block;
            width: 100%;
            padding: 12px;
            background-color: var(--accent-color);
            color: #000;
            text-align: center;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            transition: background 0.3s;
            margin-top: auto; /* Empuja el botón al fondo de la tarjeta */
        }

        .btn-view:hover {
            background-color: var(--accent-hover);
        }

        /* Botón Ruleta Flotante */
        .btn-random {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: var(--danger-color);
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(229, 9, 20, 0.4);
            transition: transform 0.2s;
            z-index: 1000;
        }

        .btn-random:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <header class="header">
        <h1>Estadios 3D</h1>
        <div class="search-container">
            <input type="text" class="search-bar" placeholder="Buscá un club o estadio...">
        </div>
    </header>

    <div class="tabs-container">
        <button class="tab active">Primera División</button>
        <button class="tab">Primera Nacional</button>
        <button class="tab">Premier League</button>
        <button class="tab">La Liga</button>
        <button class="tab">Mundial 2026</button>
    </div>

    <main class="grid">
        <!-- El contenido se inyecta dinámicamente desde el motor JS de abajo -->
    </main>

    <button class="btn-random">🎲 Vuelo Aleatorio</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    
    <script>
        // 1. URL CSV de Google Sheets
        const urlCSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSOscYU1T4flrTrs9jJMa44jHnsXIOMcPUTBm0ZRycgZZL01yEAky4iuhwZvrDgNa7zterjPY7ZujzG/pub?output=csv"; 

        // 2. Motor de renderizado dinámico
        Papa.parse(urlCSV, {
            download: true,
            header: true, 
            complete: function(results) {
                const datos = results.data;
                const grilla = document.querySelector('.grid');
                grilla.innerHTML = ''; 
                
                datos.forEach(fila => {
                    if(fila.Estadio && fila.Club) {
                        // Verificamos si existe link en la columna Foto, si no dejamos vacío
                        const urlFoto = fila.Foto ? fila.Foto.trim() : '';
                        
                        // Renderizado de la tarjeta estructurada con validación de imagen
                        const tarjeta = `
                        <article class="card">
                            <div class="estadio-foto-container">
                                ${urlFoto ? 
                                    `<img class="card-img-logo" src="${urlFoto}" alt="Escudo de ${fila.Club}" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">` : 
                                    ''
                                }
                                <div class="placeholder-text" style="${urlFoto ? 'display: none;' : 'display: block;'}">
                                    ${fila.Club}
                                </div>
                            </div>
                            <div class="card-content">
                                <h2 class="card-title">${fila.Estadio}</h2>
                                <p class="card-subtitle">${fila.Club} • ${fila.País || 'Argentina'}</p>
                                <p style="font-size: 0.85rem; color: #b3b3b3; margin-bottom: 15px; line-height: 1.4;">${fila['Dato Curioso'] || ''}</p>
                                <a href="${fila['Link del Video'] || '#'}" target="_blank" class="btn-view">Ver Vuelo 3D</a>
                            </div>
                        </article>`;
                        grilla.innerHTML += tarjeta;
                    }
                });
            },
            error: function(err) {
                document.querySelector('.grid').innerHTML = '<h2 style="color:white; text-align:center; padding: 40px;">Error al conectar con Google Sheets. Revisá que el archivo esté publicado en la Web como CSV.</h2>';
            }
        });
    </script>
</body>
</html>
