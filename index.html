<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estadios Virtuales | El Mundo Desde el Aire</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        /* Variables de colores (Estilo Modo Oscuro Premium) */
        :root {
            --bg-color: #0c0c0c;
            --card-bg: #161616;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --accent-color: #1db954; /* Verde estilo Spotify */
            --accent-hover: #1ed760;
            --danger-color: #e50914; /* Rojo estilo Netflix */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-bottom: 50px;
        }

        /* PORTADA CINEMÁTICA CON IDENTIDAD OPTIMIZADA */
        .hero-section {
            position: relative;
            padding: 60px 20px 40px 20px;
            text-align: center;
            background: linear-gradient(180deg, rgba(29, 185, 84, 0.12) 0%, rgba(20, 20, 20, 0.6) 50%, var(--bg-color) 100%), 
                        radial-gradient(circle at top, #1a3a21 0%, #0c0c0c 70%);
            border-bottom: 1px solid #1a1a1a;
        }

        .hero-content {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Logo optimizado */
        .brand-logo {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid var(--accent-color);
            box-shadow: 0 4px 20px rgba(29, 185, 84, 0.3), inset 0 0 15px rgba(0,0,0,0.5);
            margin-bottom: 18px;
            transition: transform 0.3s ease;
        }

        .brand-logo:hover {
            transform: scale(1.04) rotate(2deg);
        }

        .hero-section h1 {
            font-size: 2.3rem;
            font-weight: 900;
            margin-bottom: 15px;
            letter-spacing: -0.5px;
            background: linear-gradient(180deg, #ffffff 0%, #e0e0e0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-subtitle {
            font-size: 1.15rem;
            color: var(--text-muted);
            margin-bottom: 30px;
            font-weight: 400;
            max-width: 600px;
            line-height: 1.6;
        }

        /* Buscador */
        .search-container {
            width: 100%;
            max-width: 550px;
            margin: 0 auto 25px auto;
            position: relative;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            border-radius: 30px;
        }

        .search-bar {
            width: 100%;
            padding: 16px 25px;
            border-radius: 30px;
            border: 1px solid #2a2a2a;
            background-color: rgba(30, 30, 30, 0.85);
            color: white;
            font-size: 1.05rem;
            outline: none;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .search-bar:focus {
            background-color: #222222;
            border-color: var(--accent-color);
            box-shadow: 0 0 15px rgba(29, 185, 84, 0.3);
        }

        .hero-stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .stat-item {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .stat-item strong {
            color: var(--text-main);
            font-size: 1.05rem;
        }

        /* SECCIÓN DE FILTROS */
        .section-ligas {
            max-width: 1200px;
            margin: 35px auto 20px auto;
            padding: 0 20px;
        }

        .section-title {
            font-size: 1.3rem;
            font-weight: 800;
            margin-bottom: 15px;
            letter-spacing: -0.5px;
            text-transform: uppercase;
            color: #f5f5f5;
            border-left: 4px solid var(--accent-color);
            padding-left: 12px;
        }

        .tabs-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 5px 0 15px 0;
            justify-content: center;
        }

        .tab {
            background-color: #1c1c1c;
            color: var(--text-main);
            border: 1px solid #252525;
            padding: 10px 22px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 700;
            white-space: nowrap;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .tab.active, .tab:hover {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
            color: #000;
            box-shadow: 0 4px 12px rgba(29, 185, 84, 0.2);
        }

        /* Grilla de Estadios */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            padding: 0 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s, background-color 0.3s;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            border: 1px solid #1f1f1f;
        }

        .card:hover {
            background-color: #1f1f1f;
            transform: translateY(-5px);
            border-color: #2d2d2d;
        }

        .estadio-foto-container {
            width: 100%;
            height: 180px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 25px;
            transition: filter 0.3s;
        }

        .card:hover .estadio-foto-container {
            filter: brightness(1.15);
        }

        .card-img-logo {
            max-height: 85%;
            max-width: 85%;
            object-fit: contain;
            filter: drop-shadow(0px 8px 12px rgba(0,0,0,0.8));
            transition: transform 0.3s ease-out;
            z-index: 2;
        }

        .card:hover .card-img-logo {
            transform: scale(1.08) rotate(2deg);
        }

        .estadio-foto-container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(0deg, rgba(22,22,22,0.9) 0%, rgba(0,0,0,0.2) 100%);
            z-index: 1;
        }

        .placeholder-text {
            color: rgba(255,255,255,0.15);
            font-weight: 900;
            font-size: 1.3rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-align: center;
            padding: 0 10px;
            z-index: 2;
        }

        .trivia-hint {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.6);
            color: var(--accent-color);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            z-index: 4;
            border: 1px solid rgba(29, 185, 84, 0.2);
            backdrop-filter: blur(4px);
            transition: all 0.3s;
        }

        .card:hover .trivia-hint {
            background: var(--accent-color);
            color: #000;
            box-shadow: 0 0 10px var(--accent-color);
        }

        /* GLOBO EMERGENTE CON PESTAÑAS (TRIVIA / MAPA) */
        .trivia-balloon {
            position: absolute;
            top: 8px;
            left: 8px;
            right: 8px;
            bottom: 8px;
            background: rgba(16, 16, 16, 0.98);
            border: 1px solid var(--accent-color);
            border-radius: 8px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transform: scale(0.92);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
        }

        .trivia-balloon.active {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1);
            box-shadow: 0 8px 24px rgba(0,0,0,0.8);
        }

        .balloon-tabs {
            display: flex;
            width: 100%;
            border-bottom: 1px solid #333;
            margin-bottom: 8px;
            flex-shrink: 0;
        }

        .b-tab {
            flex: 1;
            background: transparent;
            color: var(--text-muted);
            border: none;
            padding: 6px 0;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .b-tab.active {
            color: var(--accent-color);
            border-bottom: 2px solid var(--accent-color);
        }

        .b-content {
            display: none;
            width: 100%;
            height: 100%;
            overflow-y: auto;
            color: var(--text-main);
            font-size: 0.85rem;
            line-height: 1.4;
            text-align: center;
            align-items: center;
            justify-content: center;
        }

        .b-content.active {
            display: flex;
        }

        .b-mapa iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 4px;
            filter: invert(100%) hue-rotate(180deg) contrast(90%) sepia(20%);
        }

        .card-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            z-index: 2;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 5px;
            letter-spacing: -0.3px;
        }

        .card-subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 15px;
        }

        .btn-view {
            display: inline-block;
            width: 100%;
            padding: 12px;
            background-color: var(--accent-color);
            color: #000;
            text-align: center;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: auto;
        }

        .btn-view:hover {
            background-color: var(--accent-hover);
        }

        /* Botón Ruleta */
        .btn-random {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: var(--danger-color);
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(229, 9, 20, 0.4);
            transition: transform 0.2s;
            z-index: 1000;
        }

        .btn-random:hover {
            transform: scale(1.05);
        }

        /* Botón Flotante de Juego */
        .btn-game {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background-color: var(--accent-color);
            color: black;
            border: none;
            padding: 15px 25px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(29, 185, 84, 0.4);
            transition: transform 0.2s;
            z-index: 1000;
        }
        .btn-game:hover {
            transform: scale(1.05);
            background-color: var(--accent-hover);
        }

        /* Estilos del panel del minijuego GeoGuessr */
        #game-ui {
            display: none;
            width: 100%;
            background: #111;
            padding: 15px;
            border-top: 2px solid var(--accent-color);
            text-align: center;
            z-index: 2010;
        }
        #game-title {
            font-size: 1.05rem;
            color: #ffffff;
            margin-bottom: 12px;
            font-weight: bold;
            line-height: 1.4;
        }
        #map-guess-container {
            width: 100%;
            height: 250px;
            background-color: #0c0c0c;
            border-radius: 8px;
            border: 1px solid #222;
            margin-bottom: 12px;
        }

        /* Modificaciones del Modal para Pantalla Dividida en Juego */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            position: relative;
            width: 90%;
            max-width: 400px;
            height: 80vh;
            background: #000;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(29, 185, 84, 0.4);
            border: 1px solid var(--accent-color);
            display: flex;
            flex-direction: column;
            transition: max-width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Clase dinámica para modo GeoGuessr extendido */
        .modal-content.stadium-guessr-layout {
            max-width: 850px;
        }

        .video-container {
            width: 100%;
            height: 100%;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Estilos específicos de marcadores Leaflet */
        .leaflet-popup-content-wrapper {
            background: #161616 !important;
            color: #ffffff !important;
            border: 1px solid var(--accent-color);
        }
        .leaflet-popup-tip {
            background: #161616 !important;
        }

        /* RESPONSIVE OPTIMIZADO */
        @media (max-width: 768px) {
            .hero-section { padding: 40px 15px 25px 15px; }
            .brand-logo { width: 90px; height: 90px; margin-bottom: 12px; }
            .hero-section h1 { font-size: 1.8rem; }
            .hero-subtitle { font-size: 1rem; margin-bottom: 20px; }
            .grid { grid-template-columns: 1fr; gap: 20px; padding: 0 15px; }
            .estadio-foto-container { height: 200px; }
            .btn-random {
                bottom: 20px;
                right: 50%;
                transform: translateX(50%);
                padding: 12px 25px;
                font-size: 0.95rem;
                width: max-content;
            }
            .btn-random:hover { transform: translateX(50%) scale(1.05); }
            .btn-game {
                bottom: 75px;
                right: 50%;
                left: auto;
                transform: translateX(50%);
                padding: 12px 25px;
                font-size: 0.95rem;
                width: max-content;
            }
        }

        /* Split screen solo en pantallas grandes en modo juego */
        @media (min-width: 769px) {
            .modal-content.stadium-guessr-layout {
                flex-direction: row;
            }
            .modal-content.stadium-guessr-layout .video-container {
                width: 50%;
                height: 100%;
                border-radius: 12px 0 0 12px;
            }
            .modal-content.stadium-guessr-layout #game-ui {
                width: 50%;
                height: 100%;
                border-top: none;
                border-left: 2px solid var(--accent-color);
                display: flex;
                flex-direction: column;
                justify-content: space-between;
                border-radius: 0 12px 12px 0;
            }
            .modal-content.stadium-guessr-layout #map-guess-container {
                flex-grow: 1;
                height: auto;
            }
        }
    </style>
</head>
<body>

    <section class="hero-section">
        <div class="hero-content">
            <img class="brand-logo" src="https://estadiosvirtuales.github.io/estadiosvirt/escudos/Logo.png" alt="Logo Estadios Virtuales" onerror="this.style.display='none';">
            <h1>ESTADIOS VIRTUALES</h1>
            <p class="hero-subtitle">Volá sobre los templos del fútbol mundial. Descubrí datos curiosos, arquitecturas imponentes y recorridos tridimensionales desde el aire.</p>
            
            <div class="search-container">
                <input type="text" class="search-bar" id="global-search" placeholder="Buscá en todo el catálogo de estadios, clubes o países...">
            </div>

            <div class="hero-stats">
                <span class="stat-item">⚡ <strong>Vuelos 3D</strong> Inmediatos</span>
                <span class="stat-item">🌍 <strong>Buscador Global</strong> Activo</span>
                <span class="stat-item">🏆 <strong>Ligas Top</strong> Internacionales</span>
            </div>
        </div>
    </section>

    <section class="section-ligas">
        <h2 class="section-title" id="titulo-grilla">Seleccioná una Categoría</h2>
        <div class="tabs-container">
            <button class="tab active" data-gid="0">Primera División</button>
            <button class="tab" data-gid="861264971">Primera Nacional</button>
            <button class="tab" data-gid="554922783">Premier League</button>
            <button class="tab" data-gid="88250864">La Liga</button>
            <button class="tab" data-gid="2013531070">Serie A</button>
            <button class="tab" data-gid="165565330">Ligue 1</button>
            <button class="tab" data-gid="96716546">Bundesliga</button>
            <button class="tab" data-gid="58862486">Brasileirao</button>
            <button class="tab" data-gid="304687071">Liga de Primera Chile</button>
        </div>
    </section>

    <main class="grid">
    </main>

    <button class="btn-game" onclick="iniciarTrivia()">🌍 Jugar StadiumGuessr</button>
    <button class="btn-random">🎲 Vuelo Aleatorio</button>

    <div id="video-modal" class="modal-overlay" onclick="cerrarModalVideo()">
        <div id="modal-card" class="modal-content" onclick="event.stopPropagation()">
            <button class="close-btn" onclick="cerrarModalVideo()">✕</button>
            <div id="modal-video-container" class="video-container"></div>
            
            <div id="game-ui">
                <h3 id="game-title">RONDA 1 DE 5 • SCORE: 0 PTS</h3>
                <div id="map-guess-container"></div>
                <button id="game-action-btn" class="btn-view" style="margin-top: 5px;">Clavá un pin en el mapa 📍</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    
    <script>
        const baseSpreadsheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSOscYU1T4flrTrs9jJMa44jHnsXIOMcPUTBm0ZRycgZZL01yEAky4iuhwZvrDgNa7zterjPY7ZujzG/pub?output=csv";

        let estadiosCargados = [];
        let catalogoGlobal = [];
        const todosLosGids = ["0", "861264971", "554922783", "88250864", "2013531070", "165565330", "96716546", "58862486", "304687071"];

        // Variables globales del motor de juego
        let guessrRondaActual = 0;
        let guessrPuntosTotales = 0;
        let guessrEstadioCorrecto = null;
        let guessrEstadiosJugados = [];
        let guessrMapInstance = null;
        let guessrUserMarker = null;
        let guessrTargetMarker = null;
        let guessrPolyline = null;
        let guessrSelectedLatLng = null;

        const coloresClubes = {
            "River Plate": "linear-gradient(135deg, #cc0000, #ffffff)",
            "Boca Juniors": "linear-gradient(135deg, #003b46, #07575b, #f4b251)",
            "Racing Club": "linear-gradient(135deg, #75aadb, #ffffff)",
            "Independiente": "linear-gradient(135deg, #b30000, #1a1a1a)",
            "San Lorenzo": "linear-gradient(135deg, #0f2042, #a61c32)",
            "Huracán": "linear-gradient(135deg, #ffffff, #e60000)",
            "Estudiantes de La Plata": "linear-gradient(135deg, #ff0000, #ffffff, #ff0000)",
            "Gimnasia y Esgrima LP": "linear-gradient(135deg, #ffffff, #002060)",
            "Rosario Central": "linear-gradient(135deg, #002060, #ffcc00)",
            "Newell's Old Boys": "linear-gradient(135deg, #000000, #cc0000)",
            "Vélez Sarsfield": "linear-gradient(135deg, #ffffff, #0000ff)",
            "Lanús": "linear-gradient(135deg, #5c061e, #2e030f)",
            "Argentinos Juniors": "linear-gradient(135deg, #e60000, #ffffff)",
            "Belgrano de Córdoba": "linear-gradient(135deg, #5cb8e4, #ffffff)",
            "Talleres": "linear-gradient(135deg, #002060, #ffffff, #002060)",
            "Atlético Tucumán": "linear-gradient(135deg, #75aadb, #ffffff)",
            "Defensa y Justicia": "linear-gradient(135deg, #008000, #ffff00)",
            "Banfield": "linear-gradient(135deg, #006400, #ffffff)",
            "Unión de Santa Fe": "linear-gradient(135deg, #ff0000, #ffffff)",
            "Platense": "linear-gradient(135deg, #6b4423, #ffffff)",
            "Instituto": "linear-gradient(135deg, #ff0000, #ffffff)",
            "Central Córdoba (SdE)": "linear-gradient(135deg, #0 black, #ffffff)",
            "Sarmiento de Junín": "linear-gradient(135deg, #004d00, #ffffff)",
            "Barracas Central": "linear-gradient(135deg, #ff0000, #ffffff)",
            "Tigre": "linear-gradient(135deg, #0000ff, #ff0000)",
            "Deportivo Riestra": "linear-gradient(135deg, #000000, #333333)",
            "Independiente Rivadavia": "linear-gradient(135deg, #000040, #ffffff)",
            "Aldosivi": "linear-gradient(135deg, #008000, #ffff00)",
            "Estudiantes de Río Cuarto": "linear-gradient(135deg, #75aadb, #ffffff)",
            "Gimnasia de Mendoza": "linear-gradient(135deg, #ffffff, #000000, #ffffff)"
        };

        function obtenerFondoClub(nombreClub) {
            if (coloresClubes[nombreClub]) return coloresClubes[nombreClub];
            return "linear-gradient(135deg, #1f1f1f, #333333)";
        }

        function abrirModalVideo(event, link, esJuego = false) {
            if (event) event.preventDefault();
            
            if (!link || link === '#' || link.includes('[Pegá tu link')) {
                alert("El video de este estadio todavía no está disponible.");
                return;
            }

            const modal = document.getElementById('video-modal');
            const card = document.getElementById('modal-card');
            const container = document.getElementById('modal-video-container');
            container.innerHTML = ''; 

            const gameUi = document.getElementById('game-ui');
            if (esJuego) {
                card.classList.add('stadium-guessr-layout');
                gameUi.style.display = 'block';
                if (window.innerWidth <= 768) {
                    container.style.height = '40%';
                }
            } else {
                card.classList.remove('stadium-guessr-layout');
                gameUi.style.display = 'none';
                container.style.height = '100%';
            }

            let urlIncrustar = link;

            if (link.includes('youtube.com') || link.includes('youtu.be')) {
                let videoId = '';
                if (link.includes('youtu.be/')) {
                    videoId = link.split('youtu.be/')[1].split('?')[0];
                } else if (link.includes('youtube.com/watch')) {
                    videoId = new URLSearchParams(new URL(link).search).get('v');
                } else if (link.includes('youtube.com/shorts/')) {
                     videoId = link.split('youtube.com/shorts/')[1].split('?')[0];
                }

                // Ocultar barras de información de YouTube en modo juego
                const queryParams = esJuego ? "?autoplay=1&controls=0&rel=0&modestbranding=1" : "?autoplay=1&rel=0&modestbranding=1";
                if (videoId) {
                    urlIncrustar = `https://www.youtube.com/embed/${videoId}${queryParams}`;
                }
                
                container.innerHTML = `<iframe src="${urlIncrustar}" style="width: 100%; height: 100%; border: none;" allow="autoplay; fullscreen" allowfullscreen></iframe>`;
            } 
            else if (link.toLowerCase().endsWith('.mp4') || link.includes('.mp4?')) {
                const attrControles = esJuego ? "autoplay loop muted" : "controls autoplay";
                container.innerHTML = `<video ${attrControles} style="width: 100%; height: 100%; object-fit: cover;"><source src="${link}" type="video/mp4"></video>`;
            } 
            else {
                container.innerHTML = `<iframe src="${link}" style="width: 100%; height: 100%; border: none;" allow="autoplay; fullscreen"></iframe>`;
            }

            modal.style.display = 'flex';
        }

        function cerrarModalVideo() {
            document.getElementById('video-modal').style.display = 'none';
            document.getElementById('modal-video-container').innerHTML = '';
            document.getElementById('game-ui').style.display = 'none';
            document.getElementById('modal-card').classList.remove('stadium-guessr-layout');
            
            if (guessrMapInstance) {
                guessrMapInstance.remove();
                guessrMapInstance = null;
            }
            guessrUserMarker = null;
            guessrTargetMarker = null;
            guessrPolyline = null;
            guessrSelectedLatLng = null;
        }

        function switchTab(event, btn, type, estadio = '', pais = '') {
            event.stopPropagation();
            const balloon = btn.closest('.trivia-balloon');
            
            balloon.querySelectorAll('.b-tab').forEach(t => t.classList.remove('active'));
            balloon.querySelectorAll('.b-content').forEach(c => c.classList.remove('active'));
            
            btn.classList.add('active');
            const content = balloon.querySelector('.b-' + type);
            content.classList.add('active');

            if (type === 'mapa' && !content.innerHTML.trim()) {
                content.innerHTML = '<span style="color:var(--text-muted); font-size: 0.8rem;">Cargando mapa en modo oscuro...</span>';
                const query = encodeURIComponent(estadio + ' stadium ' + pais);
                setTimeout(() => {
                    content.innerHTML = `<iframe src="https://maps.google.com/maps?q=${query}&t=m&z=16&ie=UTF8&iwloc=&output=embed" loading="lazy"></iframe>`;
                }, 100);
            }
        }

        function renderizarTarjetas(listaEstadios) {
            const grilla = document.querySelector('.grid');
            grilla.innerHTML = ''; 

            if (listaEstadios.length === 0) {
                grilla.innerHTML = '<h3 style="color:var(--text-muted); text-align:center; width:100%; padding:40px;">No se encontraron estadios que coincidan con la búsqueda.</h3>';
                return;
            }
            
            listaEstadios.forEach(fila => {
                const urlFoto = fila.Foto ? fila.Foto.trim() : '';
                const clubNombre = fila.Club.trim();
                const fondoGradiente = obtenerFondoClub(clubNombre);
                const pais = fila.País || 'Argentina';
                const estadio = fila.Estadio || 'Estadio';
                const linkVideo = fila['Link del Video'] ? fila['Link del Video'].trim() : '#';
                
                const datoLimpio = (fila['Dato Curioso'] || '¡Este club esconde grandes historias en su estadio!').replace(/'/g, "&#39;").replace(/"/g, "&quot;");

                const tarjeta = `
                <article class="card">
                    <div class="estadio-foto-container" style="background: ${fondoGradiente};" onclick="toggleTriviaPopup(event, this)">
                        <div class="trivia-hint">💡</div>
                        ${urlFoto ? `<img class="card-img-logo" src="${urlFoto}" alt="Escudo de ${clubNombre}" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">` : ''}
                        <div class="placeholder-text" style="${urlFoto ? 'display: none;' : 'display: block;'}">${clubNombre}</div>
                        <div class="trivia-balloon" onclick="event.stopPropagation()">
                            <div class="balloon-tabs">
                                <button class="b-tab active" onclick="switchTab(event, this, 'trivia')">Trivia</button>
                                <button class="b-tab" onclick="switchTab(event, this, 'mapa', '${estadio}', '${pais}')">Mapa</button>
                            </div>
                            <div class="b-content b-trivia active"><p>${datoLimpio}</p></div>
                            <div class="b-content b-mapa"></div>
                        </div>
                    </div>
                    <div class="card-content">
                        <h2 class="card-title">${estadio}</h2>
                        <p class="card-subtitle">${clubNombre} • ${pais}</p>
                        <button onclick="abrirModalVideo(event, '${linkVideo}')" class="btn-view">Ver Vuelo 3D</button>
                    </div>
                </article>`;
                grilla.innerHTML += tarjeta;
            });
        }

        function cargarLiga(gid) {
            const grilla = document.querySelector('.grid');
            grilla.innerHTML = '<h3 style="color:var(--text-muted); text-align:center; width:100%; padding:40px;">Cargando estadios...</h3>';
            document.getElementById('global-search').value = '';

            Papa.parse(`${baseSpreadsheetUrl}&gid=${gid}`, {
                download: true,
                header: true, 
                complete: function(results) {
                    estadiosCargados = results.data.filter(fila => fila.Estadio && fila.Club);
                    renderizarTarjetas(estadiosCargados);
                }
            });
        }

        function indexarCatalogoMasivo() {
            todosLosGids.forEach(gid => {
                Papa.parse(`${baseSpreadsheetUrl}&gid=${gid}`, {
                    download: true,
                    header: true,
                    complete: function(results) {
                        results.data.filter(fila => fila.Estadio && fila.Club).forEach(estadio => {
                            if (!catalogoGlobal.some(e => e.Estadio === estadio.Estadio && e.Club === estadio.Club)) {
                                catalogoGlobal.push(estadio);
                            }
                        });
                    }
                });
            });
        }

        document.getElementById('global-search').addEventListener('input', function(e) {
            const terminoBusqueda = e.target.value.toLowerCase().trim();
            if (terminoBusqueda === '') {
                document.getElementById('titulo-grilla').innerText = "Seleccioná una Categoría";
                renderizarTarjetas(estadiosCargados);
            } else {
                document.getElementById('titulo-grilla').innerText = "Resultados del Catálogo Masivo";
                const estadiosFiltrados = catalogoGlobal.filter(fila => {
                    const estadio = (fila.Estadio || '').toLowerCase();
                    const club = (fila.Club || '').toLowerCase();
                    const pais = (fila.País || '').toLowerCase();
                    return estadio.includes(terminoBusqueda) || club.includes(terminoBusqueda) || pais.includes(terminoBusqueda);
                });
                renderizarTarjetas(estadiosFiltrados);
            }
        });

        function toggleTriviaPopup(event, elementoContainer) {
            event.stopPropagation();
            const globoActual = elementoContainer.querySelector('.trivia-balloon');
            const yaEstaAbierto = globoActual.classList.contains('active');

            document.querySelectorAll('.trivia-balloon').forEach(g => {
                g.classList.remove('active');
            });
            if (!yaEstaAbierto) globoActual.classList.add('active');
        }

        document.addEventListener('click', function() {
            document.querySelectorAll('.trivia-balloon').forEach(g => g.classList.remove('active'));
        });

        // =========================================================================
        // 🌍 MOTOR DEL MINIJUEGO INTERACTIVO STADIUMGUESSR (5 RONDAS CON MAPA)
        // =========================================================================
        function iniciarTrivia() {
            if (catalogoGlobal.length === 0) {
                alert('Esperá un segundo a que cargue todo el catálogo de estadios...');
                return;
            }

            guessrRondaActual = 1;
            guessrPuntosTotales = 0;
            guessrEstadiosJugados = [];

            lanzarRondaGuessr();
        }

        function lanzarRondaGuessr() {
           // FILTRO ESTRICTO: Solo estadios con videos reales de YouTube y coordenadas cargadas
            const estadiosDisponibles = catalogoGlobal.filter(f => {
                const link = f['Link del Video'] ? f['Link del Video'].toString().trim() : '';
                const esYouTube = link.includes('youtube.com') || link.includes('youtu.be');
                const tieneLat = f.Latitud && f.Latitud.toString().trim() !== '';
                const tieneLng = f.Longitud && f.Longitud.toString().trim() !== '';
                const yaJugado = guessrEstadiosJugados.includes(f.Estadio);
                return esYouTube && tieneLat && tieneLng && !yaJugado;
            });

            if (estadiosDisponibles.length === 0) {
                alert('¡Georreferencias completadas en este set!');
                finalizarJuegoGuessr();
                return;
            }

            guessrEstadioCorrecto = estadiosDisponibles[Math.floor(Math.random() * estadiosDisponibles.length)];
            guessrEstadiosJugados.push(guessrEstadioCorrecto.Estadio);
            guessrSelectedLatLng = null;

            // Actualizar interfaz del panel
            document.getElementById('game-title').innerHTML = `RONDA ${guessrRondaActual} DE 5 • SCORE: ${guessrPuntosTotales} PTS`;
            const actionBtn = document.getElementById('game-action-btn');
            actionBtn.innerText = "Clavá un pin en el mapa 📍";
            actionBtn.style.backgroundColor = "var(--card-bg)";
            actionBtn.style.color = "var(--text-muted)";
            actionBtn.disabled = true;

            // Abrir el modal y desplegar video
            abrirModalVideo(null, guessrEstadioCorrecto['Link del Video'].trim(), true);

            // Inicializar mapa interactivo Leaflet con delay para evitar errores de renderizado de cajas DOM
            setTimeout(() => {
                if (guessrMapInstance) {
                    guessrMapInstance.remove();
                }

                // Generar mapa centrado globalmente
                guessrMapInstance = L.map('map-guess-container', {
                    attributionControl: false,
                    zoomControl: false
                }).setView([20, 0], 1);

               // Capa de mapa mudo limpia sin el error del {r}
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}.png', {
                    maxZoom: 18
                }).addTo(guessrMapInstance);

                // Escucha de clics geográficos del usuario
                guessrMapInstance.on('click', function(e) {
                    if (actionBtn.getAttribute('data-estado') === 'resultado') return;

                    guessrSelectedLatLng = e.latlng;

                    if (guessrUserMarker) {
                        guessrUserMarker.setLatLng(guessrSelectedLatLng);
                    } else {
                        guessrUserMarker = L.marker(guessrSelectedLatLng).addTo(guessrMapInstance);
                    }

                    actionBtn.innerText = "Confirmar Ubicación 🚀";
                    actionBtn.style.backgroundColor = "var(--accent-color)";
                    actionBtn.style.color = "#000";
                    actionBtn.disabled = false;
                });

                // Forzar refresco de Leaflet por si cargó desfasado el contenedor responsivo
                guessrMapInstance.invalidateSize();
            }, 300);

            actionBtn.setAttribute('data-estado', 'juego');
            actionBtn.onclick = function() {
                if (this.getAttribute('data-estado') === 'juego') {
                    procesarArriesgoGuessr();
                } else {
                    avanzarDeRondaGuessr();
                }
            };
        }

        function procesarArriesgoGuessr() {
            const actionBtn = document.getElementById('game-action-btn');
            actionBtn.setAttribute('data-estado', 'resultado');

            // Leer coordenadas reales del dataset (convirtiendo comas de Excel a puntos de JavaScript)
            const targetLat = parseFloat(guessrEstadioCorrecto.Latitud.toString().replace(',', '.'));
            const targetLng = parseFloat(guessrEstadioCorrecto.Longitud.toString().replace(',', '.'));

            const userLat = guessrSelectedLatLng.lat;
            const userLng = guessrSelectedLatLng.lng;

            // Calcular distancia matemática exacta
            const distanciaKm = calcularDistanciaHaversine(userLat, userLng, targetLat, targetLng);

            // Fórmula de asignación de puntaje exponencial estilo GeoGuessr (Máximo 5000 puntos)
            const puntosRonda = Math.max(0, Math.round(5000 * Math.pow(Math.E, -distanciaKm / 1200)));
            guessrPuntosTotales += puntosRonda;

            // Dibujar punto real y trayectoria en el mapa
            guessrTargetMarker = L.circleMarker([targetLat, targetLng], {
                radius: 8,
                color: 'var(--accent-color)',
                fillColor: '#000',
                fillOpacity: 1,
                weight: 3
            }).addTo(guessrMapInstance).bindPopup(`<b>${guessrEstadioCorrecto.Estadio}</b><br>${guessrEstadioCorrecto.Club}`).openPopup();

            guessrPolyline = L.polyline([[userLat, userLng], [targetLat, targetLng]], {
                color: 'var(--danger-color)',
                weight: 2,
                dashArray: '5, 8'
            }).addTo(guessrMapInstance);

            // Ajustar encuadre del mapa para mostrar el vector de error completo
            const bounds = L.featureGroup([guessrUserMarker, guessrTargetMarker]).getBounds();
            guessrMapInstance.fitBounds(bounds, { padding: [30, 30] });

            // Mostrar resultados en la interfaz
            document.getElementById('game-title').innerHTML = `RONDA ${guessrRondaActual} DE 5 • SCORE: ${guessrPuntosTotales} PTS`;
            
            actionBtn.innerHTML = `Le erraste por <b>${distanciaKm.toFixed(1)} km</b>. (+${puntosRonda} pts) • Siguiente ➡️`;
            actionBtn.style.backgroundColor = "var(--danger-color)";
            actionBtn.style.color = "white";
        }

        function avanzarDeRondaGuessr() {
            // Remover capas del mapa previo
            if (guessrUserMarker) guessrUserMarker.remove();
            if (guessrTargetMarker) guessrTargetMarker.remove();
            if (guessrPolyline) guessrPolyline.remove();
            guessrUserMarker = null;
            guessrTargetMarker = null;
            guessrPolyline = null;

            guessrRondaActual++;
            if (guessrRondaActual <= 5) {
                lanzarRondaGuessr();
            } else {
                finalizarJuegoGuessr();
            }
        }

        function finalizarJuegoGuessr() {
            const container = document.getElementById('modal-video-container');
            const gameUi = document.getElementById('game-ui');
            
            gameUi.style.display = 'none';
            container.style.height = '100%';
            document.getElementById('modal-card').classList.remove('stadium-guessr-layout');

            if (guessrMapInstance) {
                guessrMapInstance.remove();
                guessrMapInstance = null;
            }

            container.innerHTML = `
                <div style="text-align: center; padding: 40px 20px; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%;">
                    <h2 style="font-size: 1.8rem; margin-bottom: 15px; color: var(--accent-color); font-weight: 900; letter-spacing: -0.5px;">🏆 CAMPEONATO COMPLETADO 🏆</h2>
                    <p style="font-size: 1.1rem; color: var(--text-muted); margin-bottom: 25px; line-height: 1.5;">Completaste las 5 rondas de reconocimiento aéreo.</p>
                    <div style="background: #111; border: 1px solid #222; padding: 20px 40px; border-radius: 12px; margin-bottom: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);">
                        <span style="font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; font-weight: bold; letter-spacing: 1px; display: block; margin-bottom: 5px;">Puntaje Final Global</span>
                        <strong style="font-size: 2.5rem; color: #ffffff; font-weight: 900;">${guessrPuntosTotales} <span style="font-size: 1.2rem; color: var(--accent-color);">Pts</span></strong>
                    </div>
                    <button onclick="iniciarTrivia()" class="btn-view" style="max-width: 240px; padding: 14px 28px; font-size: 1rem; box-shadow: 0 4px 12px rgba(29, 185, 84, 0.3);">Volar de nuevo 🎮</button>
                </div>
            `;
        }

        // Función matemática del Haversine (Métrica de distancia sobre arco geodésico)
        function calcularDistanciaHaversine(lat1, lon1, lat2, lon2) {
            const R = 6371; // Radio medio de la Tierra en kilómetros
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c; 
        }
        // =========================================================================

        indexarCatalogoMasivo();
        const primerGid = document.querySelector('.tab.active').getAttribute('data-gid');
        cargarLiga(primerGid);
    </script>
</body>
