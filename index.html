<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estadios Virtuales | El Mundo Desde el Aire</title>
    <style>
        /* Variables de colores (Estilo Modo Oscuro Premium) */
        :root {
            --bg-color: #0c0c0c;
            --card-bg: #161616;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --accent-color: #1db954; /* Verde estilo Spotify */
            --accent-hover: #1ed760;
            --danger-color: #e50914; /* Rojo estilo Netflix */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-bottom: 50px;
        }

        /* PORTADA CINEMÁTICA CON IDENTIDAD OPTIMIZADA */
        .hero-section {
            position: relative;
            padding: 60px 20px 40px 20px;
            text-align: center;
            background: linear-gradient(180deg, rgba(29, 185, 84, 0.12) 0%, rgba(20, 20, 20, 0.6) 50%, var(--bg-color) 100%), 
                        radial-gradient(circle at top, #1a3a21 0%, #0c0c0c 70%);
            border-bottom: 1px solid #1a1a1a;
        }

        .hero-content {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Logo optimizado: circular, simétrico y con marco sutil */
        .brand-logo {
            width: 130px;
            height: 130px;
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid var(--accent-color);
            filter: drop-shadow(0px 8px 24px rgba(29, 185, 84, 0.35));
            margin-bottom: 18px;
            transition: transform 0.3s ease;
        }

        .brand-logo:hover {
            transform: scale(1.04) rotate(2deg);
        }

        /* Título balanceado y de menor tamaño */
        .hero-section h1 {
            font-size: 2.3rem;
            font-weight: 900;
            margin-bottom: 15px;
            letter-spacing: -0.5px;
            background: linear-gradient(180deg, #ffffff 0%, #e0e0e0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-subtitle {
            font-size: 1.15rem;
            color: var(--text-muted);
            margin-bottom: 30px;
            font-weight: 400;
            max-width: 600px;
            line-height: 1.6;
        }

        /* Buscador Modernizado dentro de la Portada */
        .search-container {
            width: 100%;
            max-width: 550px;
            margin: 0 auto 25px auto;
            position: relative;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            border-radius: 30px;
        }

        .search-bar {
            width: 100%;
            padding: 16px 25px;
            border-radius: 30px;
            border: 1px solid #2a2a2a;
            background-color: rgba(30, 30, 30, 0.85);
            color: white;
            font-size: 1.05rem;
            outline: none;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .search-bar:focus {
            background-color: #222222;
            border-color: var(--accent-color);
            box-shadow: 0 0 15px rgba(29, 185, 84, 0.3);
        }

        /* Stats Rápidos de la Portada */
        .hero-stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .stat-item {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .stat-item strong {
            color: var(--text-main);
            font-size: 1.05rem;
        }
