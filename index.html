<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estadios Virtuales | El Mundo Desde el Aire</title>
    <style>
        /* Variables de colores (Estilo Modo Oscuro Premium) */
        :root {
            --bg-color: #121212;
            --card-bg: #181818;
            --text-main: #ffffff;
            --text-muted: #b3b3b3;
            --accent-color: #1db954; /* Verde estilo Spotify */
            --accent-hover: #1ed760;
            --danger-color: #e50914; /* Rojo estilo Netflix */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-bottom: 50px;
        }

        /* Cabecera y Buscador */
        .header {
            padding: 30px 20px;
            text-align: center;
            background: linear-gradient(180deg, #282828 0%, var(--bg-color) 100%);
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .search-container {
            max-width: 600px;
            margin: 0 auto;
        }

        .search-bar {
            width: 100%;
            padding: 15px 20px;
            border-radius: 30px;
            border: none;
            background-color: #2a2a2a;
            color: white;
            font-size: 1.1rem;
            outline: none;
            transition: background-color 0.3s;
        }

        .search-bar:focus {
            background-color: #333333;
        }

        /* Pestañas de Ligas */
        .tabs-container {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            padding: 10px 20px;
            margin-bottom: 20px;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .tabs-container::-webkit-scrollbar {
            display: none;
        }

        .tab {
            background-color: #2a2a2a;
            color: var(--text-main);
            border: none;
            padding: 10px 24px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            white-space: nowrap;
            transition: background 0.3s, color 0.3s;
        }

        .tab.active, .tab:hover {
            background-color: var(--accent-color);
            color: #000;
        }

        /* Grilla de Estadios */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            padding: 0 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Tarjeta de Estadio */
        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s, background-color 0.3s;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            background-color: #282828;
            transform: translateY(-5px);
        }

        .estadio-foto-container {
            width: 100%;
            height: 180px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 20px;
            transition: filter 0.3s;
        }

        .card:hover .estadio-foto-container {
            filter: brightness(1.15);
        }

        .card-img-logo {
            max-height: 85%;
            max-width: 85%;
            object-fit: contain;
            filter: drop-shadow(0px 10px 15px rgba(0,0,0,0.65));
            transition: transform 0.3s ease-out;
            z-index: 2;
        }

        .card:hover .card-img-logo {
            transform: scale(1.08) rotate(2deg);
        }

        .estadio-foto-container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(0deg, rgba(24,24,24,0.8) 0%, rgba(0,0,0,0.2) 100%);
            z-index: 1;
        }

        .placeholder-text {
            color: rgba(255,255,255,0.2);
            font-weight: 900;
            font-size: 1.3rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-align: center;
            padding: 0 10px;
            z-index: 2;
        }

        .card-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            z-index: 2;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 5px;
            letter-spacing: -0.3px;
        }

        .card-subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 15px;
        }

        .btn-view {
            display: inline-block;
            width: 100%;
            padding: 12px;
            background-color: var(--accent-color);
            color: #000;
            text-align: center;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            transition: background 0.3s;
            margin-top: auto;
        }

        .btn-view:hover {
            background-color: var(--accent-hover);
        }

        /* Botón Ruleta Flotante */
        .btn-random {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: var(--danger-color);
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(229, 9, 20, 0.4);
            transition: transform 0.2s;
            z-index: 1000;
        }

        .btn-random:hover {
            transform: scale(1.05);
        }
    </style>
</head>

        function obtenerFondoClub(nombreClub) {
            if (coloresClubes[nombreClub]) return coloresClubes[nombreClub];
            return "linear-gradient(135deg, #1f1f1f, #333333)";
        }

        // Función central para cargar cualquier pestaña usando su GID
        function cargarLiga(gid) {
            const grilla = document.querySelector('.grid');
            grilla.innerHTML = '<h3 style="color:var(--text-muted); text-align:center; width:100%; padding:40px;">Cargando estadios...</h3>';
            
            const urlCompleta = `${baseSpreadsheetUrl}&gid=${gid}`;

            Papa.parse(urlCompleta, {
                download: true,
                header: true, 
                complete: function(results) {
                    const datos = results.data;
                    grilla.innerHTML = ''; 
                    
                    datos.forEach(fila => {
                        if(fila.Estadio && fila.Club) {
                            const urlFoto = fila.Foto ? fila.Foto.trim() : '';
                            const clubNombre = fila.Club.trim();
                            const fondoGradiente = obtenerFondoClub(clubNombre);
                            
                            const tarjeta = `
                            <article class="card">
                                <div class="estadio-foto-container" style="background: ${fondoGradiente};">
                                    ${urlFoto ? 
                                        `<img class="card-img-logo" src="${urlFoto}" alt="Escudo de ${clubNombre}" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">` : 
                                        ''
                                    }
                                    <div class="placeholder-text" style="${urlFoto ? 'display: none;' : 'display: block;'}">
                                        ${clubNombre}
                                    </div>
                                </div>
                                <div class="card-content">
                                    <h2 class="card-title">${fila.Estadio}</h2>
                                    <p class="card-subtitle">${clubNombre} • ${fila.País || 'Argentina'}</p>
                                    <p style="font-size: 0.85rem; color: #b3b3b3; margin-bottom: 15px; line-height: 1.4; flex-grow: 1;">${fila['Dato Curioso'] || ''}</p>
                                    <a href="${fila['Link del Video'] || '#'}" target="_blank" class="btn-view">Ver Vuelo 3D</a>
                                </div>
                            </article>`;
                            grilla.innerHTML += tarjeta;
                        }
                    });
                },
                error: function(err) {
                    grilla.innerHTML = '<h2 style="color:white; text-align:center; padding: 40px;">Error al conectar con esta liga. Verificá el GID de la pestaña.</h2>';
                }
            });
        }

        // Lógica para escuchar los clics en los botones de las pestañas
        document.querySelectorAll('.tab').forEach(boton => {
            boton.addEventListener('click', function() {
                document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                
                const gidId = this.getAttribute('data-gid');
                cargarLiga(gidId);
            });
        });

        // Carga inicial por defecto (Primera División con el primer GID)
        const primerGid = document.querySelector('.tab.active').getAttribute('data-gid');
        cargarLiga(primerGid);
    </script>
